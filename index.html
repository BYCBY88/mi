
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测评数据批量导入工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .toolbar {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .status-bar {
            padding: 15px 30px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            display: none;
        }

        .status-bar.show {
            display: block;
        }

        .status-bar.success {
            background: #d4edda;
            border-left-color: #28a745;
        }

        .status-bar.error {
            background: #f8d7da;
            border-left-color: #dc3545;
        }

        .table-container {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background: #495057;
            color: white;
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            white-space: nowrap;
            min-width: 100px;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #dee2e6;
        }

        tr:hover {
            background: #f8f9fa;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 13px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .row-number {
            width: 50px;
            text-align: center;
            color: #6c757d;
            font-weight: 600;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        .progress-bar.show {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .config-section {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .config-section label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        .config-section input {
            width: 100%;
            max-width: 400px;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
        }

        .help-text {
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
        }

        .stats {
            display: flex;
            gap: 20px;
            padding: 15px 30px;
            background: #e9ecef;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #495057;
        }

        .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 测评数据批量导入工具</h1>
            <p>快速填写表格数据，一键提交到 PocketBase 服务器</p>
        </div>

        <div class="config-section">
            <label for="pbUrl">PocketBase 服务器地址</label>
            <input type="text" id="pbUrl" value="https://bygbyg.cloud-ip.cc" placeholder="https://your-server.com">
            <div class="help-text">默认已配置为你的服务器地址，如需修改请自行调整</div>
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" onclick="addRow()">➕ 添加行</button>
            <button class="btn btn-secondary" onclick="addMultipleRows()">➕ 添加10行</button>
            <button class="btn btn-success" onclick="submitAll()">🚀 一键提交全部</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ 清空所有</button>
            <button class="btn btn-secondary" onclick="loadExample()">📋 加载示例数据</button>
            <button class="btn btn-secondary" onclick="exportCSV()">💾 导出当前表格</button>
            <button class="btn btn-secondary" onclick="exportFullDatabase()">📦 导出全库备份</button>
            <button class="btn btn-secondary" onclick="importCSV()">📂 导入CSV</button>
            <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCSVImport(event)">
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalRows">0</div>
                <div class="stat-label">总行数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="successCount">0</div>
                <div class="stat-label">成功</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="failedCount">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">待提交</div>
            </div>
        </div>

        <div class="status-bar" id="statusBar"></div>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th class="row-number">#</th>
                        <th>测评人</th>
                        <th>老师ID</th>
                        <th>老师姓名</th>
                        <th>年龄</th>
                        <th>身高(cm)</th>
                        <th>体重(kg)</th>
                        <th>单价</th>
                        <th>胸围</th>
                        <th>胸围档位</th>
                        <th>胸型质感</th>
                        <th>皮肤</th>
                        <th>声音</th>
                        <th>纹身</th>
                        <th>颜值</th>
                        <th>胸型</th>
                        <th>腰腹</th>
                        <th>臀腿</th>
                        <th>配合度</th>
                        <th>不足之处</th>
                        <th>最终得分</th>
                        <th>评级</th>
                        <th>描述</th>
                        <th>超级兵</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let rowCount = 0;
        let successCount = 0;
        let failedCount = 0;

        // 初始化时添加5行
        window.onload = function() {
            for (let i = 0; i < 5; i++) {
                addRow();
            }
        };

        function addRow() {
            rowCount++;
            const tbody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.id = `row-${rowCount}`;
            
            row.innerHTML = `
                <td class="row-number">${rowCount}</td>
                <td><input type="text" class="field-evaluator" placeholder="张三"></td>
                <td><input type="text" class="field-teacher_id" placeholder="T001"></td>
                <td><input type="text" class="field-teacher_name" placeholder="王老师"></td>
                <td><input type="number" class="field-age" min="18" max="60" placeholder="25"></td>
                <td><input type="number" class="field-height" min="140" max="200" placeholder="165"></td>
                <td><input type="number" class="field-weight" min="40" max="80" placeholder="50"></td>
                <td><input type="number" class="field-price" min="3" max="10" placeholder="5"></td>
                <td><input type="text" class="field-bust" placeholder="A杯"></td>
                <td>
                    <select class="field-bust_level">
                        <option value="">-</option>
                        <option value="A_minus">A-</option>
                        <option value="A">A</option>
                        <option value="B_minus">B-</option>
                        <option value="A_plus">A+</option>
                    </select>
                </td>
                <td>
                    <select class="field-breast_nature">
                        <option value="natural">正常</option>
                        <option value="soft">柔软(+0.5)</option>
                        <option value="hard">偏硬(-0.5)</option>
                    </select>
                </td>
                <td>
                    <select class="field-skin">
                        <option value="normal">正常</option>
                        <option value="rough">粗糙(-0.5)</option>
                        <option value="smooth">光滑(+0.5)</option>
                    </select>
                </td>
                <td>
                    <select class="field-voice">
                        <option value="normal">正常</option>
                        <option value="unpleasant">难听(-0.5)</option>
                        <option value="pleasant">悦耳(+0.5)</option>
                    </select>
                </td>
                <td>
                    <select class="field-tattoo">
                        <option value="light">无或小面积</option>
                        <option value="heavy">大面积明显(-0.5)</option>
                    </select>
                </td>
                <td><input type="number" class="field-score_look" min="1" max="5" step="0.5" placeholder="4"></td>
                <td><input type="number" class="field-score_breast" min="1" max="5" step="0.5" placeholder="4"></td>
                <td><input type="number" class="field-score_waist" min="1" max="5" step="0.5" placeholder="3"></td>
                <td><input type="number" class="field-score_body_lower" min="1" max="5" step="0.5" placeholder="4"></td>
                <td><input type="number" class="field-score_service" min="1" max="5" step="0.5" placeholder="4"></td>
                <td>
                    <select class="field-has_shortcoming">
                        <option value="false">无</option>
                        <option value="true">有(-0.5)</option>
                    </select>
                </td>
                <td><input type="number" class="field-final_score" step="0.01" readonly style="background:#f0f0f0;color:#666;font-weight:bold;" title="自动计算"></td>
                <td><input type="text" class="field-rating" placeholder="优秀"></td>
                <td><input type="text" class="field-description" placeholder="很满意"></td>
                <td>
                    <select class="field-is_super">
                        <option value="true" selected>是</option>
                        <option value="false">否</option>
                    </select>
                </td>
                <td><button class="delete-btn" onclick="deleteRow(${rowCount})">删除</button></td>
            `;
            
            tbody.appendChild(row);

            // 为所有影响分数的字段添加监听器
            const calcFields = row.querySelectorAll('.field-score_look, .field-score_breast, .field-score_waist, .field-score_body_lower, .field-score_service, .field-bust_level, .field-breast_nature, .field-skin, .field-voice, .field-tattoo, .field-has_shortcoming');
            calcFields.forEach(field => {
                field.addEventListener('change', () => calculateFinalScore(row));
                field.addEventListener('input', () => calculateFinalScore(row));
            });

            updateStats();
        }

        function addMultipleRows() {
            for (let i = 0; i < 10; i++) {
                addRow();
            }
        }

        function deleteRow(id) {
            const row = document.getElementById(`row-${id}`);
            if (row) {
                row.remove();
                renumberRows();
                updateStats();
            }
        }

        function renumberRows() {
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach((row, index) => {
                row.querySelector('.row-number').textContent = index + 1;
            });
            rowCount = rows.length;
        }

        function clearAll() {
            if (confirm('确定要清空所有数据吗？')) {
                document.getElementById('tableBody').innerHTML = '';
                rowCount = 0;
                successCount = 0;
                failedCount = 0;
                updateStats();
                showStatus('已清空所有数据', 'success');
            }
        }

        function updateStats() {
            document.getElementById('totalRows').textContent = rowCount;
            document.getElementById('successCount').textContent = successCount;
            document.getElementById('failedCount').textContent = failedCount;
            document.getElementById('pendingCount').textContent = rowCount - successCount - failedCount;
        }

        function calculateFinalScore(row) {
            // 基础分(加权)
            const scoreLook = parseFloat(row.querySelector('.field-score_look').value) || 0;
            const scoreBreast = parseFloat(row.querySelector('.field-score_breast').value) || 0;
            const scoreWaist = parseFloat(row.querySelector('.field-score_waist').value) || 0;
            const scoreBodyLower = parseFloat(row.querySelector('.field-score_body_lower').value) || 0;
            const scoreService = parseFloat(row.querySelector('.field-score_service').value) || 0;

            const baseScore = (
                scoreLook * 0.2 +
                scoreBreast * 0.2 +
                scoreWaist * 0.2 +
                scoreBodyLower * 0.15 +
                scoreService * 0.25
            );

            // 增减分项
            let bonus = 0;

            // 胸型质感: 柔软+0.5, 偏硬-0.5
            const breastNature = row.querySelector('.field-breast_nature').value;
            if (breastNature === 'soft') bonus += 0.5;
            else if (breastNature === 'hard') bonus -= 0.5;

            // 胸围档位: A/A-扣1分, B-/A+扣0.5分
            const bustLevel = row.querySelector('.field-bust_level').value;
            if (bustLevel === 'A' || bustLevel === 'A_minus') bonus -= 1;
            else if (bustLevel === 'B_minus' || bustLevel === 'A_plus') bonus -= 0.5;

            // 皮肤: 粗糙-0.5, 光滑+0.5
            const skin = row.querySelector('.field-skin').value;
            if (skin === 'rough') bonus -= 0.5;
            else if (skin === 'smooth') bonus += 0.5;

            // 声音: 难听-0.5, 悦耳+0.5
            const voice = row.querySelector('.field-voice').value;
            if (voice === 'unpleasant') bonus -= 0.5;
            else if (voice === 'pleasant') bonus += 0.5;

            // 纹身: 大面积明显-0.5
            const tattoo = row.querySelector('.field-tattoo').value;
            if (tattoo === 'heavy') bonus -= 0.5;

            // 不足之处: 有-0.5
            const hasShortcoming = row.querySelector('.field-has_shortcoming').value;
            if (hasShortcoming === 'true') bonus -= 0.5;

            const finalScore = baseScore + bonus;

            row.querySelector('.field-final_score').value = finalScore.toFixed(2);
        }

        function showStatus(message, type = '') {
            const statusBar = document.getElementById('statusBar');
            statusBar.textContent = message;
            statusBar.className = 'status-bar show ' + type;

            setTimeout(() => {
                statusBar.classList.remove('show');
            }, 5000);
        }

        function getRowData(row) {
            // 获取不足之处文本(如果有)
            const hasShortcoming = row.querySelector('.field-has_shortcoming').value;
            const shortcomingText = hasShortcoming === 'true' ? '存在不足之处' : null;

            return {
                evaluator: row.querySelector('.field-evaluator').value.trim(),
                teacher_id: row.querySelector('.field-teacher_id').value.trim(),
                teacher_name: row.querySelector('.field-teacher_name').value.trim(),
                age: row.querySelector('.field-age').value ? parseInt(row.querySelector('.field-age').value) : null,
                height: row.querySelector('.field-height').value ? parseInt(row.querySelector('.field-height').value) : null,
                weight: row.querySelector('.field-weight').value ? parseInt(row.querySelector('.field-weight').value) : null,
                price: row.querySelector('.field-price').value ? parseInt(row.querySelector('.field-price').value) : null,
                bust: row.querySelector('.field-bust').value.trim() || null,
                breast_nature: row.querySelector('.field-breast_nature').value,
                skin: row.querySelector('.field-skin').value,
                voice: row.querySelector('.field-voice').value,
                tattoo: row.querySelector('.field-tattoo').value,
                score_look: parseFloat(row.querySelector('.field-score_look').value) || 0,
                score_breast: parseFloat(row.querySelector('.field-score_breast').value) || 0,
                score_waist: parseFloat(row.querySelector('.field-score_waist').value) || 0,
                score_body_lower: parseFloat(row.querySelector('.field-score_body_lower').value) || 0,
                score_service: parseFloat(row.querySelector('.field-score_service').value) || 0,
                final_score: parseFloat(row.querySelector('.field-final_score').value) || 0,
                rating: row.querySelector('.field-rating').value.trim(),
                shortcoming: shortcomingText,
                description: row.querySelector('.field-description').value.trim() || null,
                is_super_soldier_review: row.querySelector('.field-is_super').value === 'true'
            };
        }

        async function submitRow(row, pbUrl) {
            const data = getRowData(row);
            
            // 验证必填字段
            if (!data.evaluator || !data.teacher_id || !data.teacher_name) {
                throw new Error('测评人、老师ID、老师姓名为必填项');
            }

            const response = await fetch(`${pbUrl}/api/collections/test_records/records`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }

            return await response.json();
        }

        async function submitAll() {
            const rows = document.querySelectorAll('#tableBody tr');
            if (rows.length === 0) {
                showStatus('没有数据可提交', 'error');
                return;
            }

            const pbUrl = document.getElementById('pbUrl').value.trim();
            if (!pbUrl) {
                showStatus('请先配置 PocketBase 服务器地址', 'error');
                return;
            }

            if (!confirm(`确定要提交 ${rows.length} 条数据到服务器吗？`)) {
                return;
            }

            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.classList.add('show');

            let currentSuccess = 0;
            let currentFailed = 0;

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const percent = Math.round(((i + 1) / rows.length) * 100);
                progressFill.style.width = percent + '%';
                progressFill.textContent = `${percent}% (${i + 1}/${rows.length})`;

                try {
                    await submitRow(row, pbUrl);
                    currentSuccess++;
                    row.style.background = '#d4edda';
                } catch (error) {
                    currentFailed++;
                    row.style.background = '#f8d7da';
                    console.error(`第 ${i + 1} 行提交失败:`, error);
                }

                // 每提交一行就更新统计
                successCount = currentSuccess;
                failedCount = currentFailed;
                updateStats();
            }

            progressBar.classList.remove('show');
            
            const message = `提交完成！成功: ${currentSuccess} 条，失败: ${currentFailed} 条`;
            showStatus(message, currentFailed === 0 ? 'success' : 'error');
            
            if (currentFailed > 0) {
                alert(`有 ${currentFailed} 条数据提交失败，请查看红色标记的行并检查控制台错误信息`);
            }
        }

        function loadExample() {
            if (rowCount > 0 && !confirm('当前已有数据，加载示例会清空现有数据，继续吗？')) {
                return;
            }

            document.getElementById('tableBody').innerHTML = '';
            rowCount = 0;
            successCount = 0;
            failedCount = 0;

            const examples = [
                {
                    evaluator: '张三',
                    teacher_id: 'T001',
                    teacher_name: '王老师',
                    age: 25,
                    height: 165,
                    weight: 50,
                    price: 5,
                    bust: 'A杯',
                    breast_nature: 'soft',
                    skin: 'normal',
                    voice: 'normal',
                    tattoo: 'light',
                    score_look: 4,
                    score_breast: 4,
                    score_waist: 3,
                    score_body_lower: 4,
                    score_service: 4,
                    rating: '优秀',
                    shortcoming: '',
                    description: '老师很专业，态度好',
                    is_super_soldier_review: false
                },
                {
                    evaluator: '李四',
                    teacher_id: 'T002',
                    teacher_name: '赵老师',
                    age: 28,
                    height: 170,
                    weight: 55,
                    price: 6,
                    bust: 'B杯',
                    breast_nature: 'natural',
                    skin: 'smooth',
                    voice: 'pleasant',
                    tattoo: 'light',
                    score_look: 5,
                    score_breast: 5,
                    score_waist: 4,
                    score_body_lower: 5,
                    score_service: 5,
                    rating: '完美',
                    shortcoming: '无',
                    description: '非常棒，强烈推荐',
                    is_super_soldier_review: false
                }
            ];

            examples.forEach(example => {
                addRow();
                const lastRow = document.querySelector('#tableBody tr:last-child');

                lastRow.querySelector('.field-evaluator').value = example.evaluator;
                lastRow.querySelector('.field-teacher_id').value = example.teacher_id;
                lastRow.querySelector('.field-teacher_name').value = example.teacher_name;
                lastRow.querySelector('.field-age').value = example.age;

        function exportCSV() {
            const rows = document.querySelectorAll('#tableBody tr');
            if (rows.length === 0) {
                showStatus('没有数据可导出', 'error');
                return;
            }

            const headers = [
                'evaluator', 'teacher_id', 'teacher_name', 'age', 'height', 'weight',
                'price', 'bust', 'breast_nature', 'skin', 'voice', 'tattoo',
                'score_look', 'score_breast', 'score_waist', 'score_body_lower',
                'score_service', 'final_score', 'rating', 'shortcoming', 'description',
                'is_super_soldier_review'
            ];

            let csv = headers.join(',') + '\n';

            rows.forEach(row => {
                const data = getRowData(row);
                const values = headers.map(header => {
                    let value = data[header];
                    if (value === null || value === undefined) value = '';
                    if (typeof value === 'boolean') value = value.toString();
                    // 如果包含逗号或双引号，需要转义
                    if (String(value).includes(',') || String(value).includes('"')) {
                        value = '"' + String(value).replace(/"/g, '""') + '"';
                    }
                    return value;
                });
                csv += values.join(',') + '\n';
            });

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `测评数据_${new Date().getTime()}.csv`;
            link.click();

            showStatus('CSV 文件已导出', 'success');
        }

        async function exportFullDatabase() {
            const pbUrl = document.getElementById('pbUrl').value.trim();
            if (!pbUrl) {
                showStatus('请先配置 PocketBase 服务器地址', 'error');
                return;
            }

            showStatus('正在从服务器获取全库数据...', '');

            try {
                // 获取所有 test_records 数据
                const response = await fetch(`${pbUrl}/api/collections/test_records/records?sort=-created&perPage=10000`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const records = data.items || [];

                if (records.length === 0) {
                    showStatus('数据库中没有数据', 'error');
                    return;
                }

                showStatus(`正在生成 CSV (${records.length} 条记录)...`, '');

                // 定义 CSV 表头(包含所有字段)
                const headers = [
                    'id', 'created', 'updated',
                    'evaluator', 'teacher_id', 'teacher_name',
                    'age', 'height', 'weight', 'price', 'bust',
                    'breast_nature', 'skin', 'voice', 'tattoo',
                    'score_look', 'score_breast', 'score_waist',
                    'score_body_lower', 'score_service', 'final_score',
                    'rating', 'shortcoming', 'description',
                    'is_super_soldier_review'
                ];

                // 生成 CSV 内容
                let csv = headers.join(',') + '\n';

                records.forEach(record => {
                    const values = headers.map(header => {
                        let value = record[header];
                        if (value === null || value === undefined) value = '';
                        if (typeof value === 'boolean') value = value.toString();
                        // 处理日期格式
                        if (header === 'created' || header === 'updated') {
                            value = new Date(value).toLocaleString('zh-CN');
                        }
                        // 如果包含逗号或双引号，需要转义
                        if (String(value).includes(',') || String(value).includes('"') || String(value).includes('\n')) {
                            value = '"' + String(value).replace(/"/g, '""') + '"';
                        }
                        return value;
                    });
                    csv += values.join(',') + '\n';
                });

                // 下载文件
                const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);

                const now = new Date();
                const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}${String(now.getSeconds()).padStart(2,'0')}`;
                link.download = `全库备份_test_records_${dateStr}.csv`;
                link.click();

                showStatus(`成功导出 ${records.length} 条记录!`, 'success');

            } catch (error) {
                console.error('导出失败:', error);
                showStatus(`导出失败: ${error.message}`, 'error');
            }
        }

        function importCSV() {
            document.getElementById('csvFile').click();
        }

        function handleCSVImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                parseCSV(text);
            };
            reader.readAsText(file, 'UTF-8');
        }

        function parseCSV(text) {
            const lines = text.split('\n').filter(line => line.trim());
            if (lines.length < 2) {
                showStatus('CSV 文件格式不正确', 'error');
                return;
            }

            // 跳过表头
            const dataLines = lines.slice(1);
            
            if (rowCount > 0 && !confirm(`将导入 ${dataLines.length} 条数据，是否清空现有数据？`)) {
                return;
            }

            document.getElementById('tableBody').innerHTML = '';
            rowCount = 0;
            successCount = 0;
            failedCount = 0;

            dataLines.forEach(line => {
                // 简单的 CSV 解析（处理引号）
                const values = parseCSVLine(line);
                if (values.length >= 3) {
                    addRow();
                    const lastRow = document.querySelector('#tableBody tr:last-child');
                    
                    const fields = [
                        'field-evaluator', 'field-teacher_id', 'field-teacher_name',
                        'field-age', 'field-height', 'field-weight', 'field-price',
                        'field-bust', 'field-breast_nature', 'field-skin', 'field-voice',
                        'field-tattoo', 'field-score_look', 'field-score_breast',
                        'field-score_waist', 'field-score_body_lower', 'field-score_service',
                        'field-final_score', 'field-rating', 'field-shortcoming',
                        'field-description', 'field-is_super'
                    ];

                    fields.forEach((fieldClass, index) => {
                        if (index < values.length) {
                            const input = lastRow.querySelector('.' + fieldClass);
                            if (input) {
                                input.value = values[index].trim();
                            }
                        }
                    });
                }
            });

            showStatus(`成功导入 ${dataLines.length} 条数据`, 'success');
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current);
                    current = '';
                } else {
                    current += char;
                }
            }
            
            result.push(current);
            return result;
        }
