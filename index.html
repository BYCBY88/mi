<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>数据表格(来源于测试报告自动计算)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .search-box {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      width: 200px;
    }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: white;
      color: #667eea;
      font-weight: 500;
    }
    
    .btn-primary:hover {
      background: #f0f0f0;
    }
    
    .btn-clear {
      background: #6c757d;
      color: white;
    }
    
    .btn-clear:hover {
      background: #5a6268;
    }

    /* 顶部筛选区域 */
    .filter-bar {
      padding: 15px 30px;
      background: #f0f2f5;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-item label {
      font-size: 14px;
      color: #333;
      white-space: nowrap;
    }
    .filter-input-top {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      width: 140px;
    }

    /* 统计栏移到表格上方 */
    .stats {
      padding: 15px 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 30px;
      font-size: 14px;
      color: #666;
      align-items: center;
    }
    
    .stats strong {
      color: #333;
    }
    
    .table-wrapper {
      overflow-x: auto;
      max-height: 70vh;
      position: relative;
    }
    /* 移动端向右滑动提示 */
    .scroll-tip {
      display: none;
      text-align: center;
      padding: 8px;
      color: #888;
      font-size: 13px;
      background: #fff8e1;
    }
    @media (max-width:768px) {
      .scroll-tip {
        display: block;
      }
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    th {
      background: #f8f9fa;
      padding: 8px 6px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
      vertical-align: top;
    }
    
    .th-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .th-label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }
    
    .th-label:hover {
      color: #667eea;
    }
    
    td {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    .tag {
      display: inline-block;
      padding: 2px 6px;
      background: #e3f2fd;
      color: #1976d2;
      border-radius: 3px;
      font-size: 11px;
      margin-right: 4px;
    }
    
    .score-high {
      color: #28a745;
      font-weight: 600;
    }
    
    .score-medium {
      color: #ffc107;
      font-weight: 600;
    }
    
    .score-low {
      color: #dc3545;
      font-weight: 600;
    }
    
    .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 12px;
      opacity: 0.3;
      transition: all 0.2s;
    }
    .th-label:hover .sort-icon {
      opacity: 0.7;
    }
    .sort-active .sort-icon {
      opacity: 1;
      color: #667eea;
      font-weight: bold;
    }
    .sort-active {
      color: #667eea;
      font-weight: 600;
    }
    .loading-text{
      text-align:center;padding:40px;color:#666;
    }
    .reload-btn{
      margin-top:12px;padding:6px 16px;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      .container {
        border-radius: 4px;
      }
      .header {
        flex-direction: column;
        gap: 12px;
        padding: 15px;
        align-items: flex-start;
      }
      .header h1 {
        font-size: 18px;
      }
      .header p {
        font-size: 12px;
      }
      .header > div > div {
        flex-wrap: wrap;
      }
      .header a {
        padding: 6px 12px !important;
        font-size: 12px !important;
      }
      .controls {
        width: 100%;
        flex-direction: column;
        gap: 8px;
      }
      .search-box {
        width: 100%;
      }
      .btn {
        flex: 1;
        margin-left: 0 !important;
      }
      .controls > div:last-child {
        display: flex;
        gap: 8px;
        width: 100%;
      }
      .filter-bar {
        padding: 12px 15px;
      }
      .filter-item {
        width: 100%;
      }
      .filter-input-top {
        width: 100%;
      }
      .table-wrapper {
        max-height: 60vh;
      }
      table {
        font-size: 11px;
      }
      th, td {
        padding: 5px 3px;
      }
      .th-content {
        min-width: 60px;
      }
      .stats {
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px 15px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>📊 老师数据表格</h1>
        <p style="margin-top: 8px; font-size: 13px; opacity: 0.9;">
           数据来源于用户真实测评反馈，仅供参考
        </p>
        <div style="margin-top: 12px; display: flex; gap: 10px;">
          <a href="https://bycby88.github.io/ZSFK/" target="_blank" style="display: inline-block; padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 4px; font-weight: 500; font-size: 13px; border: 1px solid rgba(255,255,255,0.3); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">
             参与测评(使用浏览器打开) →
          </a>
        </div>
      </div>
      <div class="controls">
        <input type="text" class="search-box" id="globalSearch" placeholder="全局搜索：姓名/ID/标签">
        <button class="btn btn-clear" onclick="clearAllFilters()">🔄 清除全部筛选</button>
      </div>
    </div>

    <!-- 顶部筛选栏：胸围（文本模糊匹配） + 单价（数字区间） -->
    <div class="filter-bar">
      <div class="filter-item">
        <label>胸围包含文字：</label>
        <input type="text" class="filter-input-top" data-field="bust" placeholder="输入字母">
      </div>
      <div class="filter-item">
        <label>单价区间：</label>
        <input type="text" class="filter-input-top" data-field="price" placeholder="例如3-10">
      </div>
    </div>

    <!-- 统计栏移至表格上方 -->
    <div class="stats">
      <span>共 <strong id="totalCount">0</strong> 位老师</span>
      <span>已认证 <strong id="verifiedCount">0</strong> 位</span>
    </div>
    
    <!-- 移动端向右滑动提示 -->
    <div class="scroll-tip">← 左右滑动表格查看更多列 →</div>
    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <!-- 第1列 综合评分 仅排序无筛选框 -->
            <th>
              <div class="th-content">
                <div class="th-label sort-active" onclick="sortTable('avgScore')">综合评分 <span class="sort-icon">↓</span></div>
              </div>
            </th>
            <!-- 第2列 姓名 仅排序无筛选框 -->
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('name')">姓名 <span class="sort-icon">↕</span></div>
              </div>
            </th>
            <!-- 第3列 好评 无筛选框 -->
            <th>
              <div class="th-content">
                <div>好评</div>
              </div>
            </th>
            <!-- 第4列 中评 无筛选框 -->
            <th>
              <div class="th-content">
                <div>中评</div>
              </div>
            </th>
            <!-- 第5列 差评 无筛选框 -->
            <th>
              <div class="th-content">
                <div>差评</div>
              </div>
            </th>
            <!-- 老师ID 无筛选框 -->
            <th>
              <div class="th-content">
                <div>老师ID</div>
              </div>
            </th>
            <!-- 年龄 仅排序无筛选框 -->
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('age')">年龄 <span class="sort-icon">↕</span></div>
              </div>
            </th>
            <!-- 身高 仅排序无筛选框 -->
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('height')">身高 <span class="sort-icon">↕</span></div>
              </div>
            </th>
            <!-- 体重 仅排序无筛选框 -->
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('weight')">体重 <span class="sort-icon">↕</span></div>
              </div>
            </th>
            <!-- 单价 仅排序，筛选框在顶部 -->
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('price')">单价 <span class="sort-icon">↕</span></div>
              </div>
            </th>
            <!-- 胸围 无筛选框 -->
            <th>
              <div class="th-content">
                <div>胸围</div>
              </div>
            </th>
            <!-- 颜值 无筛选框 -->
            <th>
              <div class="th-content">
                <div>颜值</div>
              </div>
            </th>
            <!-- 胸型 无筛选框 -->
            <th>
              <div class="th-content">
                <div>胸型</div>
              </div>
            </th>
            <!-- 腰腹 无筛选框 -->
            <th>
              <div class="th-content">
                <div>腰腹</div>
              </div>
            </th>
            <!-- 臀腿 无筛选框 -->
            <th>
              <div class="th-content">
                <div>臀腿</div>
              </div>
            </th>
            <!-- 配合度 无筛选框 -->
            <th>
              <div class="th-content">
                <div>配合度</div>
              </div>
            </th>
            <!-- 特色标签 无筛选框 -->
            <th>
              <div class="th-content">
                <div>特色标签</div>
              </div>
            </th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="17" class="loading-text">正在加载数据……</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script>
    // Cloudflare Workers API 配置
    const API_URL = 'https://api.byg88.biz';
    // 【核心拆分】rawAllData：原始全量数据（仅存入缓存，不排序不筛选）
    let rawAllData = [];
    // currentData：仅用于渲染的临时数组，不写入缓存
    let currentData = [];
    let sortField = 'avgScore';
    let sortDirection = 'desc';
    let filters = {};
    let globalSearchTerm = '';
    let hasRetried = false;

    // 缓存key：只存储原始未排序数据
    const CACHE_RAW_KEY = 'teacher_raw_all_data';
    const CACHE_TIME_KEY = 'teacher_table_cache_time_cf';
    const CACHE_DURATION = 30 * 60 * 1000; // 30分钟

    // 带超时的fetch封装
    function fetchWithTimeout(url, timeout = 8000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      return fetch(url, { signal: controller.signal })
        .finally(() => clearTimeout(id));
    }

    // 统一通用排序对比函数（所有排序复用，基于全局sortField/sortDirection）
    function sortCompareFunc(a, b) {
      let valA = a[sortField];
      let valB = b[sortField];
      // 判断是否数字类型
      const numA = parseFloat(valA);
      const numB = parseFloat(valB);
      if (!isNaN(numA) && !isNaN(numB)) {
        valA = numA;
        valB = numB;
      }
      // 升降序判断
      if (valA > valB) return sortDirection === 'desc' ? -1 : 1;
      if (valA < valB) return sortDirection === 'desc' ? 1 : -1;
      return 0;
    }

    // 从 Cloudflare Workers API 加载数据
    async function loadData() {
      const tbody = document.getElementById('tableBody');
      const now = Date.now();
      const cachedRaw = localStorage.getItem(CACHE_RAW_KEY);
      const cacheTime = localStorage.getItem(CACHE_TIME_KEY);

      // 优先读取缓存原始数据
      if (cachedRaw && cacheTime && (now - parseInt(cacheTime)) < CACHE_DURATION) {
        rawAllData = JSON.parse(cachedRaw);
        // 关键：读取原始数据后立刻强制重排，消除缓存旧顺序
        currentData = [...rawAllData].sort(sortCompareFunc);
        renderTable(currentData);
        // 后台静默刷新最新接口数据
        remoteRefresh();
        return;
      }

      try {
        tbody.innerHTML = '<tr><td colspan="17" class="loading-text">请求远程数据中……</td></tr>';
        const response = await fetchWithTimeout(`${API_URL}/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const result = await response.json();
        const records = result.items || [];

        if (records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="17" style="text-align:center;padding:40px;color:#999;">暂无数据</td></tr>';
          return;
        }

        // 按老师ID分组统计
        const teacherStats = {};
        for (const record of records) {
          const teacherId = record.teacher_id;
          if (!teacherStats[teacherId]) {
            teacherStats[teacherId] = {
              teacher_id: teacherId,
              teacher_name: record.teacher_name,
              age: record.age,
              height: record.height,
              weight: record.weight,
              price: record.price,
              bust: record.bust,
              totalScore: 0,
              count: 0,
              goodCount: 0,
              mediumCount: 0,
              badCount: 0,
              features: [],
              totalScoreLook: 0,
              totalScoreBreast: 0,
              totalScoreWaist: 0,
              totalScoreBodyLower: 0,
              totalScoreService: 0,
              hasSuperReview: false,
            };
          }

          const score = Number(record.final_score || 0);
          teacherStats[teacherId].totalScore += score;
          teacherStats[teacherId].count += 1;
          teacherStats[teacherId].totalScoreLook += Number(record.score_look || 0);
          teacherStats[teacherId].totalScoreBreast += Number(record.score_breast || 0);
          teacherStats[teacherId].totalScoreWaist += Number(record.score_waist || 0);
          teacherStats[teacherId].totalScoreBodyLower += Number(record.score_body_lower || 0);
          teacherStats[teacherId].totalScoreService += Number(record.score_service || 0);

          // 判断本条测评是否为超级测评
          if (Number(record.is_super_soldier_review || 0) === 1) {
            teacherStats[teacherId].hasSuperReview = true;
          }

          if (score >= 8.5) {
            teacherStats[teacherId].goodCount += 1;
          } else if (score >= 6) {
            teacherStats[teacherId].mediumCount += 1;
          } else {
            teacherStats[teacherId].badCount += 1;
          }

          if (record.features && Array.isArray(record.features)) {
            record.features.forEach(feature => {
              if (!teacherStats[teacherId].features.includes(feature)) {
                teacherStats[teacherId].features.push(feature);
              }
            });
          }
        }

        // 转换数组、计算平均分，赋值给原始数据源
        rawAllData = Object.values(teacherStats).map(stats => ({
          ...stats,
          avgScore: stats.totalScore / stats.count,
          avgScoreLook: stats.totalScoreLook / stats.count,
          avgScoreBreast: stats.totalScoreBreast / stats.count,
          avgScoreWaist: stats.totalScoreWaist / stats.count,
          avgScoreBodyLower: stats.totalScoreBodyLower / stats.count,
          avgScoreService: stats.totalScoreService / stats.count,
          // 认证判定：存在超级测评 OR 测评总数大于5
          isVerified: stats.hasSuperReview || stats.count > 5,
        }));

        // 缓存仅存储原始未排序数据
        localStorage.setItem(CACHE_RAW_KEY, JSON.stringify(rawAllData));
        localStorage.setItem(CACHE_TIME_KEY, now.toString());

        // 原始数据复制一份，执行默认排序作为渲染数组
        currentData = [...rawAllData].sort(sortCompareFunc);
        renderTable(currentData);

      } catch (error) {
        console.error('加载异常', error);
        // 自动重试一次（仅首次失败重试）
        if (!hasRetried) {
          hasRetried = true;
          tbody.innerHTML = '<tr><td colspan="17" class="loading-text">网络波动，正在自动重试……</td></tr>';
          setTimeout(loadData, 1200);
          return;
        }
        tbody.innerHTML = `<tr><td colspan="17" style="text-align:center;padding:40px;color:#dc3545;">加载数据失败<br><button class="btn reload-btn" onclick="loadData()">点击重新加载</button></td></tr>`;
      }
    }

    // 后台静默刷新远程最新数据（缓存存在时调用）
    async function remoteRefresh() {
      try {
        const response = await fetchWithTimeout(`${API_URL}/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at`);
        if (!response.ok) return;
        const result = await response.json();
        const records = result.items || [];
        if(records.length === 0) return;
        const teacherStats = {};
        for (const record of records) {
          const teacherId = record.teacher_id;
          if (!teacherStats[teacherId]) {
            teacherStats[teacherId] = {
              teacher_id: teacherId,
              teacher_name: record.teacher_name,
              age: record.age,
              height: record.height,
              weight: record.weight,
              price: record.price,
              bust: record.bust,
              totalScore: 0,
              count: 0,
              goodCount: 0,
              mediumCount: 0,
              badCount: 0,
              features: [],
              totalScoreLook: 0,
              totalScoreBreast: 0,
              totalScoreWaist: 0,
              totalScoreBodyLower: 0,
              totalScoreService: 0,
              hasSuperReview: false,
            };
          }
          const score = Number(record.final_score || 0);
          teacherStats[teacherId].totalScore += score;
          teacherStats[teacherId].count += 1;
          teacherStats[teacherId].totalScoreLook += Number(record.score_look || 0);
          teacherStats[teacherId].totalScoreBreast += Number(record.score_breast || 0);
          teacherStats[teacherId].totalScoreWaist += Number(record.score_waist || 0);
          teacherStats[teacherId].totalScoreBodyLower += Number(record.score_body_lower || 0);
          teacherStats[teacherId].totalScoreService += Number(record.score_service || 0);
          // 超级测评标记
          if (Number(record.is_super_soldier_review || 0) === 1) {
            teacherStats[teacherId].hasSuperReview = true;
          }
          if (score >= 8.5) teacherStats[teacherId].goodCount +=1;
          else if(score>=6) teacherStats[teacherId].mediumCount +=1;
          else teacherStats[teacherId].badCount +=1;
          if(record.features && Array.isArray(record.features)){
            record.features.forEach(f=>{
              if(!teacherStats[teacherId].features.includes(f)) teacherStats[teacherId].features.push(f);
            })
          }
        }
        const newRaw = Object.values(teacherStats).map(stats => ({
          ...stats,
          avgScore: stats.totalScore / stats.count,
          avgScoreLook: stats.totalScoreLook / stats.count,
          avgScoreBreast: stats.totalScoreBreast / stats.count,
          avgScoreWaist: stats.totalScoreWaist / stats.count,
          avgScoreBodyLower: stats.totalScoreBodyLower / stats.count,
          avgScoreService: stats.totalScoreService / stats.count,
          isVerified: stats.hasSuperReview || stats.count > 5,
        }));
        // 更新缓存原始数据
        rawAllData = newRaw;
        localStorage.setItem(CACHE_RAW_KEY, JSON.stringify(rawAllData));
        localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
        // 重新排序渲染
        currentData = [...rawAllData].sort(sortCompareFunc);
        renderTable(currentData);
      }catch(e){}
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      data.forEach((teacher) => {
        const row = document.createElement('tr');
        
        const featuresHtml = teacher.features.length > 0 
          ? teacher.features.map(f => `<span class="tag">${f}</span>`).join('') 
          : '-';
        
        row.innerHTML = `
          <td class="${teacher.avgScore >= 8.5 ? 'score-high' : teacher.avgScore >= 6 ? 'score-medium' : 'score-low'}"><strong>${teacher.avgScore.toFixed(2)}</strong></td>
          <td><strong>${teacher.teacher_name}</strong></td>
          <td class="score-high">${teacher.goodCount}</td>
          <td class="score-medium">${teacher.mediumCount}</td>
          <td class="score-low">${teacher.badCount}</td>
          <td style="font-family: monospace; font-size: 12px;">${teacher.teacher_id}</td>
          <td>${teacher.age}</td>
          <td>${teacher.height}cm</td>
          <td>${teacher.weight}kg</td>
          <td>${teacher.price}档</td>
          <td>${teacher.bust}</td>
          <td>${teacher.avgScoreLook.toFixed(1)}</td>
          <td>${teacher.avgScoreBreast.toFixed(1)}</td>
          <td>${teacher.avgScoreWaist.toFixed(1)}</td>
          <td>${teacher.avgScoreBodyLower.toFixed(1)}</td>
          <td>${teacher.avgScoreService.toFixed(1)}</td>
          <td>${featuresHtml}</td>
        `;
        
        tbody.appendChild(row);
      });
      
      document.getElementById('totalCount').textContent = data.length;
      document.getElementById('verifiedCount').textContent = data.filter(t => t.isVerified).length;
    }

    function applyFilters() {
      // 第一步：永远从原始数据复制，执行全局排序，再筛选
      let sortedBase = [...rawAllData].sort(sortCompareFunc);
      let filtered = [...sortedBase];
      
      // 全局搜索 匹配姓名/ID/标签
      if (globalSearchTerm) {
        const term = globalSearchTerm.toLowerCase();
        filtered = filtered.filter(t =>
          t.teacher_name.toLowerCase().includes(term) ||
          t.teacher_id.toLowerCase().includes(term) ||
          t.features.some(tag => tag.toLowerCase().includes(term))
        );
      }

      // 允许过滤字段：bust（文本模糊）、price（数字区间）
      const allowFilterFields = ['bust', 'price'];
      Object.keys(filters).forEach(field => {
        if (!allowFilterFields.includes(field)) return;
        const filterValue = filters[field];
        if (!filterValue) return;

        filtered = filtered.filter(t => {
          const value = t[field];
          
          // 胸围：文本模糊匹配
          if (field === 'bust') {
            return String(value).toLowerCase().includes(filterValue.toLowerCase());
          }
          // 单价：数字区间匹配
          if (field === 'price') {
            if (typeof value === 'number') {
              const numFilter = parseFloat(filterValue);
              if (!isNaN(numFilter)) {
                if (filterValue.includes('-')) {
                  const parts = filterValue.split('-').map(p => parseFloat(p.trim()));
                  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                    return value >= parts[0] && value <= parts[1];
                  }
                }
                return value === numFilter;
              }
            }
          }
          
          return true;
        });
      });

      currentData = filtered;
      renderTable(filtered);
    }

    function sortTable(field) {
      if (sortField === field) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDirection = 'desc';
      }

      document.querySelectorAll('.th-label').forEach(label => {
        label.classList.remove('sort-active');
        const icon = label.querySelector('.sort-icon');
        if (icon) icon.textContent = '↕';
      });

      const activeLabels = document.querySelectorAll(`.th-label[onclick="sortTable('${field}')"]`);
      activeLabels.forEach(label => {
        label.classList.add('sort-active');
        const icon = label.querySelector('.sort-icon');
        if (icon) icon.textContent = sortDirection === 'asc' ? '↑' : '↓';
      });

      applyFilters();
    }

    function clearAllFilters() {
      filters = {};
      globalSearchTerm = '';
      
      document.querySelectorAll('.filter-input-top').forEach(input => {
        input.value = '';
      });
      document.getElementById('globalSearch').value = '';
      
      applyFilters();
    }

    // 绑定2个筛选框事件：胸围、单价
    document.querySelectorAll('.filter-input-top').forEach(input => {
      input.addEventListener('input', function(e) {
        const field = e.target.dataset.field;
        const value = e.target.value.trim();
        if (value) {
          filters[field] = value;
        } else {
          delete filters[field];
        }
        applyFilters();
      });
    });

    document.getElementById('globalSearch').addEventListener('input', function(e) {
      globalSearchTerm = e.target.value.trim();
      applyFilters();
    });

    document.addEventListener('DOMContentLoaded', ()=>{
      loadData();
    });

    // 浏览器后退缓存页面强制重排
    window.addEventListener('pageshow', (e) => {
      if (e.persisted && rawAllData.length > 0) {
        currentData = [...rawAllData].sort(sortCompareFunc);
        applyFilters();
      }
    })
  </script>
</body>
</html>
