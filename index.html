<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>老师数据表格</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .search-box {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      width: 200px;
    }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: white;
      color: #667eea;
      font-weight: 500;
    }
    
    .btn-primary:hover {
      background: #f0f0f0;
    }
    
    .btn-clear {
      background: #6c757d;
      color: white;
    }
    
    .btn-clear:hover {
      background: #5a6268;
    }

    /* 统计栏移到表格上方 */
    .stats {
      padding: 15px 30px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 30px;
      font-size: 14px;
      color: #666;
      align-items: center;
    }
    
    .stats strong {
      color: #333;
    }
    
    .table-wrapper {
      overflow-x: auto;
      max-height: 70vh;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    th {
      background: #f8f9fa;
      padding: 8px 6px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
      vertical-align: top;
    }
    
    .th-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .th-label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }
    
    .th-label:hover {
      color: #667eea;
    }
    
    .filter-input {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 11px;
      outline: none;
    }
    
    .filter-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }
    
    td {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .badge-green {
      background: #d4edda;
      color: #155724;
    }
    
    .badge-gray {
      background: #e0e0e0;
      color: #666;
    }
    .tag {
      display: inline-block;
      padding: 2px 6px;
      background: #e3f2fd;
      color: #1976d2;
      border-radius: 3px;
      font-size: 11px;
      margin-right: 4px;
    }
    
    .score-high {
      color: #28a745;
      font-weight: 600;
    }
    
    .score-medium {
      color: #ffc107;
      font-weight: 600;
    }
    
    .score-low {
      color: #dc3545;
      font-weight: 600;
    }
    
    .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 12px;
      opacity: 0.3;
      transition: all 0.2s;
    }
    .th-label:hover .sort-icon {
      opacity: 0.7;
    }
    .sort-active .sort-icon {
      opacity: 1;
      color: #667eea;
      font-weight: bold;
    }
    .sort-active {
      color: #667eea;
      font-weight: 600;
    }
    .active-filter {
      background: #fff3cd !important;
    }
    .loading-text{
      text-align:center;padding:40px;color:#666;
    }
    .reload-btn{
      margin-top:12px;padding:6px 16px;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      .container {
        border-radius: 4px;
      }
      .header {
        flex-direction: column;
        gap: 12px;
        padding: 15px;
        align-items: flex-start;
      }
      .header h1 {
        font-size: 18px;
      }
      .header p {
        font-size: 12px;
      }
      .header > div > div {
        flex-wrap: wrap;
      }
      .header a {
        padding: 6px 12px !important;
        font-size: 12px !important;
      }
      .controls {
        width: 100%;
        flex-direction: column;
        gap: 8px;
      }
      .search-box {
        width: 100%;
      }
      .btn {
        flex: 1;
        margin-left: 0 !important;
      }
      .controls > div:last-child {
        display: flex;
        gap: 8px;
        width: 100%;
      }
      .table-wrapper {
        max-height: 60vh;
      }
      table {
        font-size: 11px;
      }
      th, td {
        padding: 5px 3px;
      }
      .th-content {
        min-width: 60px;
      }
      .filter-input {
        font-size: 9px;
        padding: 2px 3px;
        min-width: 50px;
      }
      .stats {
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px 15px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>📊 老师数据表格</h1>
        <p style="margin-top: 8px; font-size: 13px; opacity: 0.9;">
           数据来源于用户真实测评反馈，仅供参考
        </p>
        <div style="margin-top: 12px; display: flex; gap: 10px;">
          <a href="https://bycby88.github.io/ZSFK/" target="_blank" style="display: inline-block; padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 4px; font-weight: 500; font-size: 13px; border: 1px solid rgba(255,255,255,0.3); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">
             参与测评(使用浏览器打开) →
          </a>
        </div>
      </div>
      <div class="controls">
        <input type="text" class="search-box" id="globalSearch" placeholder="全局搜索...">
        <button class="btn btn-clear" onclick="clearAllFilters()">🔄 清除筛选</button>
      </div>
    </div>

    <!-- 统计栏移至表格上方 -->
    <div class="stats">
      <span>共 <strong id="totalCount">0</strong> 位老师</span>
      <span>已认证 <strong id="verifiedCount">0</strong> 位</span>
    </div>
    
    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <!-- 第1列 综合评分 -->
            <th>
              <div class="th-content">
                <div class="th-label sort-active" onclick="sortTable('avgScore')">综合评分 <span class="sort-icon">↓</span></div>
                <input type="text" class="filter-input" data-field="avgScore" placeholder="最小-最大">
              </div>
            </th>
            <!-- 第2列 姓名 -->
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('name')">姓名 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="teacher_name" placeholder="过滤姓名...">
              </div>
            </th>
            <!-- 第3列 好评 -->
            <th>
              <div class="th-content">
                <div>好评</div>
                <input type="text" class="filter-input" data-field="goodCount" placeholder="≥ 最小值">
              </div>
            </th>
            <!-- 第4列 中评 -->
            <th>
              <div class="th-content">
                <div>中评</div>
                <input type="text" class="filter-input" data-field="mediumCount" placeholder="≥ 最小值">
              </div>
            </th>
            <!-- 第5列 差评 -->
            <th>
              <div class="th-content">
                <div>差评</div>
                <input type="text" class="filter-input" data-field="badCount" placeholder="≥ 最小值">
              </div>
            </th>
            <!-- 剩余字段顺延 -->
            <th>
              <div class="th-content">
                <div>老师ID</div>
                <input type="text" class="filter-input" data-field="teacher_id" placeholder="过滤ID...">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('age')">年龄 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="age" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('height')">身高 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="height" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('weight')">体重 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="weight" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('price')">单价 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="price" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>胸围</div>
                <input type="text" class="filter-input" data-field="bust" placeholder="过滤胸围...">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>颜值</div>
                <input type="text" class="filter-input" data-field="avgScoreLook" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>胸型</div>
                <input type="text" class="filter-input" data-field="avgScoreBreast" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>腰腹</div>
                <input type="text" class="filter-input" data-field="avgScoreWaist" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>臀腿</div>
                <input type="text" class="filter-input" data-field="avgScoreBodyLower" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>配合度</div>
                <input type="text" class="filter-input" data-field="avgScoreService" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>认证状态</div>
                <select class="filter-input" data-field="isVerified">
                  <option value="">全部</option>
                  <option value="true">已认证</option>
                  <option value="false">未认证</option>
                </select>
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>特色标签</div>
                <input type="text" class="filter-input" data-field="features" placeholder="过滤标签...">
              </div>
            </th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="18" class="loading-text">正在加载数据……</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script>
    // Cloudflare Workers API 配置
    const API_URL = 'https://api.byg88.biz';
    let currentData = [];
    let sortField = 'avgScore';
    let sortDirection = 'desc';
    let filters = {};
    let globalSearchTerm = '';
    let hasRetried = false;

    // 缓存配置
    const CACHE_KEY = 'teacher_table_data_cf';
    const CACHE_TIME_KEY = 'teacher_table_cache_time_cf';
    const CACHE_DURATION = 30 * 60 * 1000; // 30分钟

    // 带超时的fetch封装
    function fetchWithTimeout(url, timeout = 8000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      return fetch(url, { signal: controller.signal })
        .finally(() => clearTimeout(id));
    }

    // 从 Cloudflare Workers API 加载数据
    async function loadData() {
      const tbody = document.getElementById('tableBody');
      const now = Date.now();
      const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
      
      // 优先读取有效缓存
      if (cachedTime && (now - parseInt(cachedTime)) < CACHE_DURATION) {
        const cachedData = localStorage.getItem(CACHE_KEY);
        if (cachedData) {
          currentData = JSON.parse(cachedData);
          // 修复：读取缓存后强制按综合评分降序重排，解决缓存乱序
          currentData.sort((a, b) => b.avgScore - a.avgScore);
          renderTable(currentData);
          // 后台静默刷新最新数据
          remoteRefresh();
          return;
        }
      }

      try {
        tbody.innerHTML = '<tr><td colspan="18" class="loading-text">请求远程数据中……</td></tr>';
        const response = await fetchWithTimeout(`${API_URL}/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const result = await response.json();
        const records = result.items || [];

        if (records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="18" style="text-align:center;padding:40px;color:#999;">暂无数据</td></tr>';
          return;
        }

        // 按老师ID分组统计
        const teacherStats = {};
        for (const record of records) {
          const teacherId = record.teacher_id;
          if (!teacherStats[teacherId]) {
            teacherStats[teacherId] = {
              teacher_id: teacherId,
              teacher_name: record.teacher_name,
              age: record.age,
              height: record.height,
              weight: record.weight,
              price: record.price,
              bust: record.bust,
              totalScore: 0,
              count: 0,
              goodCount: 0,
              mediumCount: 0,
              badCount: 0,
              features: [],
              totalScoreLook: 0,
              totalScoreBreast: 0,
              totalScoreWaist: 0,
              totalScoreBodyLower: 0,
              totalScoreService: 0,
            };
          }

          const score = Number(record.final_score || 0);
          teacherStats[teacherId].totalScore += score;
          teacherStats[teacherId].count += 1;
          teacherStats[teacherId].totalScoreLook += Number(record.score_look || 0);
          teacherStats[teacherId].totalScoreBreast += Number(record.score_breast || 0);
          teacherStats[teacherId].totalScoreWaist += Number(record.score_waist || 0);
          teacherStats[teacherId].totalScoreBodyLower += Number(record.score_body_lower || 0);
          teacherStats[teacherId].totalScoreService += Number(record.score_service || 0);

          if (score >= 8.5) {
            teacherStats[teacherId].goodCount += 1;
          } else if (score >= 6) {
            teacherStats[teacherId].mediumCount += 1;
          } else {
            teacherStats[teacherId].badCount += 1;
          }

          if (record.features && Array.isArray(record.features)) {
            record.features.forEach(feature => {
              if (!teacherStats[teacherId].features.includes(feature)) {
                teacherStats[teacherId].features.push(feature);
              }
            });
          }
        }

        // 转换数组、计算平均分
        currentData = Object.values(teacherStats).map(stats => ({
          ...stats,
          avgScore: stats.totalScore / stats.count,
          avgScoreLook: stats.totalScoreLook / stats.count,
          avgScoreBreast: stats.totalScoreBreast / stats.count,
          avgScoreWaist: stats.totalScoreWaist / stats.count,
          avgScoreBodyLower: stats.totalScoreBodyLower / stats.count,
          avgScoreService: stats.totalScoreService / stats.count,
          isVerified: new Set(records.filter(r => r.teacher_id === stats.teacher_id).map(r => r.evaluator)).size > 5,
        }));

        sortField = 'avgScore';
        sortDirection = 'desc';
        currentData.sort((a, b) => b.avgScore - a.avgScore);

        renderTable(currentData);

        // 更新本地缓存
        localStorage.setItem(CACHE_KEY, JSON.stringify(currentData));
        localStorage.setItem(CACHE_TIME_KEY, now.toString());
      } catch (error) {
        console.error('加载异常', error);
        // 自动重试一次（仅首次失败重试）
        if (!hasRetried) {
          hasRetried = true;
          tbody.innerHTML = '<tr><td colspan="18" class="loading-text">网络波动，正在自动重试……</td></tr>';
          setTimeout(loadData, 1200);
          return;
        }
        tbody.innerHTML = `<tr><td colspan="18" style="text-align:center;padding:40px;color:#dc3545;">加载数据失败<br><button class="btn reload-btn" onclick="loadData()">点击重新加载</button></td></tr>`;
      }
    }

    // 后台静默刷新远程最新数据（缓存存在时调用）
    async function remoteRefresh() {
      try {
        const response = await fetchWithTimeout(`${API_URL}/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at`);
        if (!response.ok) return;
        const result = await response.json();
        const records = result.items || [];
        if(records.length === 0) return;
        const teacherStats = {};
        for (const record of records) {
          const teacherId = record.teacher_id;
          if (!teacherStats[teacherId]) {
            teacherStats[teacherId] = {
              teacher_id: teacherId,
              teacher_name: record.teacher_name,
              age: record.age,
              height: record.height,
              weight: record.weight,
              price: record.price,
              bust: record.bust,
              totalScore: 0,
              count: 0,
              goodCount: 0,
              mediumCount: 0,
              badCount: 0,
              features: [],
              totalScoreLook: 0,
              totalScoreBreast: 0,
              totalScoreWaist: 0,
              totalScoreBodyLower: 0,
              totalScoreService: 0,
            };
          }
          const score = Number(record.final_score || 0);
          teacherStats[teacherId].totalScore += score;
          teacherStats[teacherId].count += 1;
          teacherStats[teacherId].totalScoreLook += Number(record.score_look || 0);
          teacherStats[teacherId].totalScoreBreast += Number(record.score_breast || 0);
          teacherStats[teacherId].totalScoreWaist += Number(record.score_waist || 0);
          teacherStats[teacherId].totalScoreBodyLower += Number(record.score_body_lower || 0);
          teacherStats[teacherId].totalScoreService += Number(record.score_service || 0);
          if (score >= 8.5) teacherStats[teacherId].goodCount +=1;
          else if(score>=6) teacherStats[teacherId].mediumCount +=1;
          else teacherStats[teacherId].badCount +=1;
          if(record.features && Array.isArray(record.features)){
            record.features.forEach(f=>{
              if(!teacherStats[teacherId].features.includes(f)) teacherStats[teacherId].features.push(f);
            })
          }
        }
        const newData = Object.values(teacherStats).map(stats => ({
          ...stats,
          avgScore: stats.totalScore / stats.count,
          avgScoreLook: stats.totalScoreLook / stats.count,
          avgScoreBreast: stats.totalScoreBreast / stats.count,
          avgScoreWaist: stats.totalScoreWaist / stats.count,
          avgScoreBodyLower: stats.totalScoreBodyLower / stats.count,
          avgScoreService: stats.totalScoreService / stats.count,
          isVerified: new Set(records.filter(r => r.teacher_id === stats.teacher_id).map(r => r.evaluator)).size > 5,
        }));
        localStorage.setItem(CACHE_KEY, JSON.stringify(newData));
        localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
        // 修复：后台刷新完最新数据，立即重新渲染表格更新页面
        renderTable(newData);
      }catch(e){}
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      data.forEach((teacher) => {
        const row = document.createElement('tr');
        
        const verifiedBadge = teacher.isVerified 
          ? '<span class="badge badge-green">已认证</span>' 
          : '<span class="badge badge-gray">未认证</span>';
        
        const featuresHtml = teacher.features.length > 0 
          ? teacher.features.map(f => `<span class="tag">${f}</span>`).join('') 
          : '-';
        
        // 列顺序与thead完全对应：综合评分、姓名、好评、中评、差评、ID、年龄、身高、体重、单价、胸围、颜值、胸型、腰腹、臀腿、配合度、认证、标签
        row.innerHTML = `
          <td class="${teacher.avgScore >= 8.5 ? 'score-high' : teacher.avgScore >= 6 ? 'score-medium' : 'score-low'}"><strong>${teacher.avgScore.toFixed(2)}</strong></td>
          <td><strong>${teacher.teacher_name}</strong></td>
          <td class="score-high">${teacher.goodCount}</td>
          <td class="score-medium">${teacher.mediumCount}</td>
          <td class="score-low">${teacher.badCount}</td>
          <td style="font-family: monospace; font-size: 12px;">${teacher.teacher_id}</td>
          <td>${teacher.age}</td>
          <td>${teacher.height}cm</td>
          <td>${teacher.weight}kg</td>
          <td>${teacher.price}档</td>
          <td>${teacher.bust}</td>
          <td>${teacher.avgScoreLook.toFixed(1)}</td>
          <td>${teacher.avgScoreBreast.toFixed(1)}</td>
          <td>${teacher.avgScoreWaist.toFixed(1)}</td>
          <td>${teacher.avgScoreBodyLower.toFixed(1)}</td>
          <td>${teacher.avgScoreService.toFixed(1)}</td>
          <td>${verifiedBadge}</td>
          <td>${featuresHtml}</td>
        `;
        
        tbody.appendChild(row);
      });
      
      document.getElementById('totalCount').textContent = data.length;
      document.getElementById('verifiedCount').textContent = data.filter(t => t.isVerified).length;
    }

    function applyFilters() {
      let filtered = [...currentData];
      
      if (globalSearchTerm) {
        const term = globalSearchTerm.toLowerCase();
        filtered = filtered.filter(t =>
          t.teacher_name.toLowerCase().includes(term) ||
          t.teacher_id.toLowerCase().includes(term) ||
          t.features.some(f => f.toLowerCase().includes(term))
        );
      }

      const minOnlyFields = ['goodCount', 'mediumCount', 'badCount',
                             'avgScoreLook', 'avgScoreBreast', 'avgScoreWaist',
                             'avgScoreBodyLower', 'avgScoreService'];

      Object.keys(filters).forEach(field => {
        const filterValue = filters[field];
        if (!filterValue) return;

        filtered = filtered.filter(t => {
          const value = t[field];
          
          if (field === 'isVerified') {
            return String(t.isVerified) === filterValue;
          }
          
          if (field === 'features') {
            return t.features.some(f => f.toLowerCase().includes(filterValue.toLowerCase()));
          }
          
          if (typeof value === 'string') {
            return value.toLowerCase().includes(filterValue.toLowerCase());
          }
          
          if (typeof value === 'number') {
            const numFilter = parseFloat(filterValue);
            if (!isNaN(numFilter)) {
              if (minOnlyFields.includes(field)) {
                return value >= numFilter;
              }
              if (filterValue.includes('-')) {
                const parts = filterValue.split('-').map(p => parseFloat(p.trim()));
                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                  return value >= parts[0] && value <= parts[1];
                }
              }
              return value === numFilter;
            }
          }
          
          return true;
        });
      });

      if (sortField) {
        filtered.sort((a, b) => {
          let aVal, bVal;
          switch(sortField) {
            case 'name':
              aVal = a.teacher_name;bVal = b.teacher_name;break;
            case 'age':
              aVal = a.age;bVal = b.age;break;
            case 'height':
              aVal = a.height;bVal = b.height;break;
            case 'weight':
              aVal = a.weight;bVal = b.weight;break;
            case 'price':
              aVal = a.price;bVal = b.price;break;
            case 'avgScore':
              aVal = a.avgScore;bVal = b.avgScore;break;
            default: return 0;
          }
          
          if (typeof aVal === 'string') {
            return sortDirection === 'asc'
              ? aVal.localeCompare(bVal)
              : bVal.localeCompare(aVal);
          }
          
          return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
        });
      }

      renderTable(filtered);

      document.querySelectorAll('.filter-input').forEach(input => {
        const field = input.dataset.field;
        const th = input.closest('th');
        if (filters[field]) {
          th.classList.add('active-filter');
        } else {
          th.classList.remove('active-filter');
        }
      });
    }

    function sortTable(field) {
      if (sortField === field) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDirection = 'desc';
      }

      document.querySelectorAll('.th-label').forEach(label => {
        label.classList.remove('sort-active');
        const icon = label.querySelector('.sort-icon');
        if (icon) icon.textContent = '↕';
      });

      const activeLabels = document.querySelectorAll(`.th-label[onclick="sortTable('${field}')"]`);
      activeLabels.forEach(label => {
        label.classList.add('sort-active');
        const icon = label.querySelector('.sort-icon');
        if (icon) icon.textContent = sortDirection === 'asc' ? '↑' : '↓';
      });

      applyFilters();
    }

    function clearAllFilters() {
      filters = {};
      globalSearchTerm = '';
      
      document.querySelectorAll('.filter-input').forEach(input => {
        if (input.tagName === 'SELECT') {
          input.value = '';
        } else {
          input.value = '';
        }
      });
      document.getElementById('globalSearch').value = '';
      
      document.querySelectorAll('th').forEach(th => th.classList.remove('active-filter'));
      
      applyFilters();
    }

    document.querySelectorAll('.filter-input').forEach(input => {
      input.addEventListener('input', function(e) {
        const field = e.target.dataset.field;
        const value = e.target.value.trim();
        if (value) {
          filters[field] = value;
        } else {
          delete filters[field];
        }
        applyFilters();
      });
    });

    document.getElementById('globalSearch').addEventListener('input', function(e) {
      globalSearchTerm = e.target.value.trim();
      applyFilters();
    });

    document.addEventListener('DOMContentLoaded', ()=>{
      loadData();
    });
  </script>
</body>
</html>
