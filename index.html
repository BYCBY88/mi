<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 移动端核心配置，禁止双击缩放、适配屏幕 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>老师数据表格 v3 移动端适配</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; /* 去除手机点击高亮 */
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 12px;
      min-height: 100vh;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 18px 16px;
    }
    .header h1 { 
      font-size: 20px; 
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .debug-info {
      background: #fff3cd;
      border: 1px solid #ffc107;
      padding: 10px;
      margin: 10px;
      font-size: 12px;
      word-break: break-all;
      border-radius: 6px;
      max-height: 160px;
      overflow-y: auto;
    }
    .loading {
      text-align: center;
      padding: 60px 10px;
      color: #666;
    }
    .loading-spinner {
      display: inline-block;
      width: 44px;
      height: 44px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error-message {
      text-align: center;
      padding: 60px 16px;
      color: #dc3545;
      line-height: 1.6;
    }
    .error-message button {
      margin-top: 20px;
      padding: 12px 28px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    /* 关键：表格横向滚动容器，手机左右滑动 */
    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch; /* ios平滑滚动 */
    }
    table {
      min-width: 900px; /* 固定最小宽度，强制触发横向滚动 */
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #f8f9fa;
      padding: 10px 6px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap; /* 表头文字不换行 */
    }
    td {
      padding: 12px 6px;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 14px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-green { background: #d4edda; color: #155724; }
    .badge-gray { background: #e0e0e0; color: #666; }
    .badge-blue { background: #cce5ff; color: #004085; }
    .score-high { color: #28a745; font-weight: 600; }
    .score-medium { color: #ffc107; font-weight: 600; }
    .score-low { color: #dc3545; font-weight: 600; }
    .footer-tip {
      padding: 16px;
      background: #f8f9fa;
      border-top: 1px solid #e0e0e0;
      font-size: 14px;
      color: #555;
    }

    /* 手机专属媒体查询（≤768px） */
    @media (max-width: 768px) {
      body { padding: 8px; }
      .header { padding: 14px 12px; }
      .header h1 { font-size: 17px; }
      table { font-size: 11px; min-width: 780px; }
      th, td { padding: 8px 4px; }
      .badge { padding: 2px 6px; font-size: 10px; }
      .loading { padding: 40px 8px; }
      .loading-spinner { width: 36px; height: 36px; border-width: 3px; }
      .error-message { padding: 40px 10px; }
      .error-message button { padding: 10px 22px; font-size: 15px; }
      .footer-tip { font-size: 13px; padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 老师数据表格 v3</h1>
      <div id="debugInfo" class="debug-info" style="display:none;"></div>
    </div>
    
    <div id="contentArea">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>正在加载数据...</div>
        <div id="loadingDetail" style="margin-top:10px;font-size:12px;color:#999;">正在连接API服务器</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://super-soldier-api.bycby88.workers.dev';
    
    function showDebug(msg) {
      const el = document.getElementById('debugInfo');
      el.style.display = 'block';
      const time = new Date().toLocaleTimeString();
      el.innerHTML += `<div>[${time}] ${msg}</div>`;
      // 自动滚动到底部
      el.scrollTop = el.scrollHeight;
    }
    
    function showError(msg, detail) {
      document.getElementById('contentArea').innerHTML = 
        '<div class="error-message">' +
        '<div style="font-size: 18px; margin-bottom:12px;">❌ ' + msg + '</div>' +
        (detail ? '<div style="margin-top:10px;font-size:13px;color:#666;text-align:left;max-width:90%;margin-left:auto;margin-right:auto;">' + detail + '</div>' : '') +
        '<button onclick="location.reload()">重新加载页面</button>' +
        '</div>';
    }
    
    function showLoadingDetail(msg) {
      document.getElementById('loadingDetail').textContent = msg;
    }

    async function loadData() {
      showDebug('=== 开始初始化加载 ===');
      showDebug('API地址: ' + API_URL);
      showDebug('设备UA: ' + navigator.userAgent.substring(0, 80));
      showDebug('屏幕宽: ' + window.innerWidth + 'px');
      
      // 手机网络容错：先短延迟提示
      showLoadingDetail('正在发起跨域请求，手机网络较慢请稍等...');
      
      try {
        // 优先XHR，移动端兼容性更强（部分安卓老webviewfetch异常）
        const xhr = new XMLHttpRequest();
        const url = API_URL + '/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at';
        
        showDebug('请求地址: ' + url);
        
        xhr.open('GET', url, true);
        xhr.setRequestHeader('Accept', 'application/json');
        // 兼容CORS预检
        xhr.setRequestHeader('Cache-Control', 'no-cache');
        
        xhr.onreadystatechange = function() {
          showDebug('XHR状态码 readyState=' + xhr.readyState);
          
          if (xhr.readyState === 4) {
            showDebug('接口返回HTTP状态: ' + xhr.status);
            
            if (xhr.status === 200) {
              try {
                const result = JSON.parse(xhr.responseText);
                showDebug('成功获取数据，总条数: ' + (result.items ? result.items.length : 0));
                processData(result.items || []);
              } catch (e) {
                showDebug('JSON解析失败: ' + e.message);
                showError('数据解析错误', e.message);
              }
            } else if(xhr.status === 0) {
              // status=0 代表跨域/网络阻断（手机最常见问题）
              showDebug('XHR status=0 跨域/网络拦截');
              tryFetch();
            } else {
              showError('接口请求失败 HTTP ' + xhr.status, `状态文本：${xhr.statusText}`);
            }
          }
        };
        
        xhr.onerror = function() {
          showDebug('XHR触发网络错误，切换fetch重试');
          tryFetch();
        };
        
        xhr.timeout = 35000; // 手机延长超时到35秒
        xhr.ontimeout = function() {
          showError('请求超时', '手机网络波动大，请切换Wi‑Fi/流量重试，超时35s');
        };
        
        xhr.send();
        
      } catch (e) {
        showDebug('XHR创建异常: ' + e.message);
        tryFetch();
      }
    }
    
    // fetch降级方案，增加跨域、超时、缓存控制
    async function tryFetch() {
      showDebug('进入Fetch备用请求方案');
      showLoadingDetail('切换第二种请求方式重试...');
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 35000);
        
        const response = await fetch(
          API_URL + '/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at',
          {
            method: 'GET',
            headers: { 
              'Accept': 'application/json',
              'Cache-Control': 'no-cache'
            },
            signal: controller.signal,
            mode: 'cors',
            cache: 'no-cache',
            credentials: 'omit' // 手机关闭cookie避免CORS冲突
          }
        );
        
        clearTimeout(timeoutId);
        showDebug('Fetch HTTP状态: ' + response.status);
        
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        
        const result = await response.json();
        processData(result.items || []);
        
      } catch (error) {
        showDebug('Fetch最终失败: ' + error.message);
        // 手机专属错误提示
        const tip = `
        手机常见解决办法：
        1. 切换Wi‑Fi/手机流量，部分运营商屏蔽worker域名
        2. 清除浏览器缓存后刷新
        3. 确认页面是https访问（http会拦截跨域）
        4. 关闭浏览器广告拦截/隐私插件
        `;
        showError('数据加载完全失败', error.message + '<br><br>' + tip);
      }
    }
    
    function processData(records) {
      if (records.length === 0) {
        document.getElementById('contentArea').innerHTML = 
          '<div style="text-align:center;padding:60px 10px;color:#999;">暂无测评数据</div>';
        return;
      }
      
      // 按老师ID分组统计
      const teacherStats = {};
      for (const record of records) {
        const teacherId = record.teacher_id;
        if (!teacherId) continue;
        
        if (!teacherStats[teacherId]) {
          teacherStats[teacherId] = {
            teacher_id: teacherId,
            teacher_name: record.teacher_name || '未知',
            age: record.age || '-',
            height: record.height || '-',
            weight: record.weight || '-',
            price: record.price || '-',
            bust: record.bust || '-',
            totalScore: 0, count: 0,
            goodCount: 0, mediumCount: 0, badCount: 0,
            superSoldierCount: 0,
            totalScoreLook: 0, totalScoreBreast: 0, totalScoreWaist: 0,
            totalScoreBodyLower: 0, totalScoreService: 0,
          };
        }
        
        const score = Number(record.final_score || 0);
        teacherStats[teacherId].totalScore += score;
        teacherStats[teacherId].count += 1;
        teacherStats[teacherId].totalScoreLook += Number(record.score_look || 0);
        teacherStats[teacherId].totalScoreBreast += Number(record.score_breast || 0);
        teacherStats[teacherId].totalScoreWaist += Number(record.score_waist || 0);
        teacherStats[teacherId].totalScoreBodyLower += Number(record.score_body_lower || 0);
        teacherStats[teacherId].totalScoreService += Number(record.score_service || 0);
        
        if (record.is_super_soldier_review === true || record.is_super_soldier_review === 1) {
          teacherStats[teacherId].superSoldierCount += 1;
        }
        
        if (score >= 8.5) teacherStats[teacherId].goodCount++;
        else if (score >= 6) teacherStats[teacherId].mediumCount++;
        else teacherStats[teacherId].badCount++;
      }
      
      // 转换数组并平均分排序
      const currentData = Object.values(teacherStats).map(stats => ({
        ...stats,
        avgScore: stats.count > 0 ? stats.totalScore / stats.count : 0,
        avgScoreLook: stats.count > 0 ? stats.totalScoreLook / stats.count : 0,
        avgScoreBreast: stats.count > 0 ? stats.totalScoreBreast / stats.count : 0,
        avgScoreWaist: stats.count > 0 ? stats.totalScoreWaist / stats.count : 0,
        avgScoreBodyLower: stats.count > 0 ? stats.totalScoreBodyLower / stats.count : 0,
        avgScoreService: stats.count > 0 ? stats.totalScoreService / stats.count : 0,
        isVerified: stats.superSoldierCount > 0,
      })).sort((a, b) => b.avgScore - a.avgScore);
      
      renderTable(currentData);
    }
    
    function renderTable(data) {
      // 外层增加横向滚动容器.table-wrap，手机左右滑动
      let html = `<div class="table-wrap">`;
      html += '<table><thead><tr>' +
        '<th>排名</th><th>老师ID</th><th>姓名</th><th>年龄</th><th>身高</th><th>体重</th>' +
        '<th>单价</th><th>胸围</th><th>综合评分</th><th>好评</th><th>中评</th><th>差评</th>' +
        '<th>超级兵</th><th>认证</th>' +
        '</tr></thead><tbody>';
      
      data.forEach((t, i) => {
        const verifiedBadge = t.isVerified 
          ? '<span class="badge badge-green">已认证</span>' 
          : '<span class="badge badge-gray">未认证</span>';
        const superSoldierText = t.superSoldierCount > 0 
          ? `<span class="badge badge-blue">${t.superSoldierCount}次</span>` 
          : '-';
        const scoreClass = t.avgScore >= 8.5 ? 'score-high' : t.avgScore >= 6 ? 'score-medium' : 'score-low';
        
        html += `<tr>` +
          `<td>${i + 1}</td>` +
          `<td>${t.teacher_id}</td>` +
          `<td><strong>${t.teacher_name}</strong></td>` +
          `<td>${t.age}</td>` +
          `<td>${t.height}</td>` +
          `<td>${t.weight}</td>` +
          `<td>${t.price}</td>` +
          `<td>${t.bust}</td>` +
          `<td class="${scoreClass}"><strong>${t.avgScore.toFixed(2)}</strong></td>` +
          `<td class="score-high">${t.goodCount}</td>` +
          `<td class="score-medium">${t.mediumCount}</td>` +
          `<td class="score-low">${t.badCount}</td>` +
          `<td>${superSoldierText}</td>` +
          `<td>${verifiedBadge}</td>` +
          `</tr>`;
      });
      
      html += '</tbody></table></div>';
      html += `<div class="footer-tip">` +
        `共 <strong>${data.length}</strong> 位老师 | ` +
        `已认证 <strong>${data.filter(t => t.isVerified).length}</strong> 位<br>` +
        `<small>👉 手机可左右滑动表格查看全部列</small>` +
        `</div>`;
      
      document.getElementById('contentArea').innerHTML = html;
      showDebug('表格渲染完成，数据加载结束');
    }
    
    // 页面DOM加载完成执行
    document.addEventListener('DOMContentLoaded', loadData);
    // 屏幕旋转时重载（手机横竖屏切换）
    window.addEventListener('orientationchange', () => {
      setTimeout(loadData, 300);
    });
  </script>
</body>
</html>
