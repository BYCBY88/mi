
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>老师数据表格</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .search-box {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      width: 200px;
    }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: white;
      color: #667eea;
      font-weight: 500;
    }
    
    .btn-primary:hover {
      background: #f0f0f0;
    }
    
    .btn-clear {
      background: #6c757d;
      color: white;
    }
    
    .btn-clear:hover {
      background: #5a6268;
    }
    
    .table-wrapper {
      overflow-x: auto;
      max-height: 70vh;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    th {
      background: #f8f9fa;
      padding: 8px 6px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
      vertical-align: top;
    }
    
    .th-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .th-label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }
    
    .th-label:hover {
      color: #667eea;
    }
    
    .filter-input {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 11px;
      outline: none;
    }
    
    .filter-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }
    
    td {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .badge-green {
      background: #d4edda;
      color: #155724;
    }
    
    .badge-gray {
      background: #e0e0e0;
      color: #666;
    }
    
    .badge-blue {
      background: #cce5ff;
      color: #004085;
    }
    
    .tag {
      display: inline-block;
      padding: 2px 6px;
      background: #e3f2fd;
      color: #1976d2;
      border-radius: 3px;
      font-size: 11px;
      margin-right: 4px;
    }
    
    .score-high {
      color: #28a745;
      font-weight: 600;
    }
    
    .score-medium {
      color: #ffc107;
      font-weight: 600;
    }
    
    .score-low {
      color: #dc3545;
      font-weight: 600;
    }
    
    .stats {
      padding: 15px 30px;
      background: #f8f9fa;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 30px;
      font-size: 14px;
      color: #666;
      align-items: center;
    }
    
    .stats strong {
      color: #333;
    }
    
    .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 12px;
      opacity: 0.3;
      transition: all 0.2s;
    }

    .th-label:hover .sort-icon {
      opacity: 0.7;
    }

    .sort-active .sort-icon {
      opacity: 1;
      color: #667eea;
      font-weight: bold;
    }

    .sort-active {
      color: #667eea;
      font-weight: 600;
    }

    .active-filter {
      background: #fff3cd !important;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      
      .header {
        flex-direction: column;
        gap: 10px;
        padding: 15px;
      }
      
      .header h1 {
        font-size: 20px;
      }
      
      .controls {
        width: 100%;
        justify-content: space-between;
      }
      
      .search-box {
        width: 150px;
      }
      
      table {
        font-size: 12px;
      }
      
      th, td {
        padding: 6px 4px;
      }
      
      .filter-input {
        font-size: 10px;
        padding: 3px 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>📊 老师数据表格</h1>
        <p style="margin-top: 8px; font-size: 13px; opacity: 0.9;">
           数据来源于用户真实测评反馈，仅供参考
        </p>
        <div style="margin-top: 12px; display: flex; gap: 10px;">
          <a href="https://bycby88.github.io/ZSFK/" target="_blank" style="display: inline-block; padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 4px; font-weight: 500; font-size: 13px; border: 1px solid rgba(255,255,255,0.3); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">
             参与测评 →
          </a>
          <a href="https://tatokdym.org/cqfkq" target="_blank" style="display: inline-block; padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 4px; font-weight: 500; font-size: 13px; border: 1px solid rgba(255,255,255,0.3); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">
             详细报告内容 →
          </a>
        </div>
      </div>
      <div class="controls">
        <input type="text" class="search-box" id="globalSearch" placeholder="全局搜索...">
        <button class="btn btn-clear" onclick="clearAllFilters()">🔄 清除筛选</button>
        <button class="btn btn-primary" onclick="exportCSV()" style="margin-left: 8px;">📥 导出CSV</button>
      </div>
    </div>
    
    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('rank')">排名 <span class="sort-icon">↕</span></div>
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>老师ID</div>
                <input type="text" class="filter-input" data-field="teacher_id" placeholder="过滤ID...">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('name')">姓名 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="teacher_name" placeholder="过滤姓名...">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('age')">年龄 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="age" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('height')">身高 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="height" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('weight')">体重 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="weight" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('price')">单价 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="price" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>胸围</div>
                <input type="text" class="filter-input" data-field="bust" placeholder="过滤胸围...">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('avgScore')">综合评分 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="avgScore" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>好评</div>
                <input type="text" class="filter-input" data-field="goodCount" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>中评</div>
                <input type="text" class="filter-input" data-field="mediumCount" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>差评</div>
                <input type="text" class="filter-input" data-field="badCount" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>颜值</div>
                <input type="text" class="filter-input" data-field="avgScoreLook" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>胸型</div>
                <input type="text" class="filter-input" data-field="avgScoreBreast" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>腰腹</div>
                <input type="text" class="filter-input" data-field="avgScoreWaist" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>臀腿</div>
                <input type="text" class="filter-input" data-field="avgScoreBodyLower" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>配合度</div>
                <input type="text" class="filter-input" data-field="avgScoreService" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('superSoldier')">超级兵 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="superSoldierCount" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>认证状态</div>
                <select class="filter-input" data-field="isVerified">
                  <option value="">全部</option>
                  <option value="true">已认证</option>
                  <option value="false">未认证</option>
                </select>
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>特色标签</div>
                <input type="text" class="filter-input" data-field="features" placeholder="过滤标签...">
              </div>
            </th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>
    
    <div class="stats">
      <span>共 <strong id="totalCount">0</strong> 位老师</span>
      <span>已认证 <strong id="verifiedCount">0</strong> 位</span>
      <span>超级兵测评 <strong id="superSoldierTotal">0</strong> 次</span>
    </div>
  </div>

  <script>
    // PocketBase 配置
    const PB_URL = 'https://bygbyg.cloud-ip.cc';

    let currentData = [];
    let sortField = 'avgScore';
    let sortDirection = 'desc';
    let filters = {};
    let globalSearchTerm = '';

    // 缓存配置
    const CACHE_KEY = 'teacher_table_data';
    const CACHE_TIME_KEY = 'teacher_table_cache_time';
    const CACHE_DURATION = 30 * 60 * 1000; // 30分钟

    // 从 PocketBase 加载数据
    async function loadData() {
      const now = Date.now();
      const cachedTime = localStorage.getItem(CACHE_TIME_KEY);

      // 检查缓存是否有效
      if (cachedTime && (now - parseInt(cachedTime)) < CACHE_DURATION) {
        const cachedData = localStorage.getItem(CACHE_KEY);
        if (cachedData) {
          currentData = JSON.parse(cachedData);
          renderTable(currentData);
          return; // 直接使用缓存，不请求API
        }
      }

      try {
        const response = await fetch(`${PB_URL}/api/collections/test_records/records?page=1&perPage=1000`);
        if (!response.ok) throw new Error('加载失败');

        const result = await response.json();
        const records = result.items || [];

        if (records.length === 0) {
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="21" style="text-align:center;padding:40px;color:#999;">暂无数据</td></tr>';
          return;
        }

        // 按老师ID分组统计
        const teacherStats = {};
        for (const record of records) {
          const teacherId = record.teacher_id;
          if (!teacherStats[teacherId]) {
            teacherStats[teacherId] = {
              teacher_id: teacherId,
              teacher_name: record.teacher_name,
              age: record.age,
              height: record.height,
              weight: record.weight,
              price: record.price,
              bust: record.bust,
              totalScore: 0,
              count: 0,
              goodCount: 0,
              mediumCount: 0,
              badCount: 0,
              features: [],
              superSoldierCount: 0,
              totalScoreLook: 0,
              totalScoreBreast: 0,
              totalScoreWaist: 0,
              totalScoreBodyLower: 0,
              totalScoreService: 0,
            };
          }

          const score = Number(record.final_score || 0);
          teacherStats[teacherId].totalScore += score;
          teacherStats[teacherId].count += 1;

          teacherStats[teacherId].totalScoreLook += Number(record.score_look || 0);
          teacherStats[teacherId].totalScoreBreast += Number(record.score_breast || 0);
          teacherStats[teacherId].totalScoreWaist += Number(record.score_waist || 0);
          teacherStats[teacherId].totalScoreBodyLower += Number(record.score_body_lower || 0);
          teacherStats[teacherId].totalScoreService += Number(record.score_service || 0);

          if (record.is_super_soldier_review === true) {
            teacherStats[teacherId].superSoldierCount += 1;
          }

          if (score >= 8.5) {
            teacherStats[teacherId].goodCount += 1;
          } else if (score >= 6) {
            teacherStats[teacherId].mediumCount += 1;
          } else {
            teacherStats[teacherId].badCount += 1;
          }

          if (record.features && Array.isArray(record.features)) {
            record.features.forEach(feature => {
              if (!teacherStats[teacherId].features.includes(feature)) {
                teacherStats[teacherId].features.push(feature);
              }
            });
          }
        }

        // 转换为数组并计算平均值
        currentData = Object.values(teacherStats).map(stats => ({
          ...stats,
          avgScore: stats.totalScore / stats.count,
          avgScoreLook: stats.totalScoreLook / stats.count,
          avgScoreBreast: stats.totalScoreBreast / stats.count,
          avgScoreWaist: stats.totalScoreWaist / stats.count,
          avgScoreBodyLower: stats.totalScoreBodyLower / stats.count,
          avgScoreService: stats.totalScoreService / stats.count,
          isVerified: stats.superSoldierCount > 0 || new Set(records.filter(r => r.teacher_id === stats.teacher_id).map(r => r.evaluator)).size > 5,
        }));

        // 默认按综合评分降序排序
        sortField = 'avgScore';
        sortDirection = 'desc';
        currentData.sort((a, b) => b.avgScore - a.avgScore);

        // 高亮综合评分列
        const avgScoreLabels = document.querySelectorAll('.th-label[onclick="sortTable(\'avgScore\')"]');
        avgScoreLabels.forEach(label => {
          label.classList.add('sort-active');
          const icon = label.querySelector('.sort-icon');
          if (icon) {
            icon.textContent = '↓';
          }
        });

        renderTable(currentData);

        // 保存到缓存
        localStorage.setItem(CACHE_KEY, JSON.stringify(currentData));
        localStorage.setItem(CACHE_TIME_KEY, now.toString());
      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="21" style="text-align:center;padding:40px;color:#dc3545;">加载数据失败，请检查网络连接</td></tr>';
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      data.forEach((teacher, index) => {
        const row = document.createElement('tr');
        
        const verifiedBadge = teacher.isVerified 
          ? '<span class="badge badge-green">已认证</span>' 
          : '<span class="badge badge-gray">未认证</span>';
        
        const superSoldierText = teacher.superSoldierCount > 0 
          ? `<span class="badge badge-blue">${teacher.superSoldierCount}次</span>` 
          : '-';
        
        const featuresHtml = teacher.features.length > 0 
          ? teacher.features.map(f => `<span class="tag">${f}</span>`).join('') 
          : '-';
        
        row.innerHTML = `
          <td>${index + 1}</td>
          <td style="font-family: monospace; font-size: 12px;">${teacher.teacher_id}</td>
          <td><strong>${teacher.teacher_name}</strong></td>
          <td>${teacher.age}</td>
          <td>${teacher.height}cm</td>
          <td>${teacher.weight}kg</td>
          <td>${teacher.price}档</td>
          <td>${teacher.bust}</td>
          <td class="${teacher.avgScore >= 8.5 ? 'score-high' : teacher.avgScore >= 6 ? 'score-medium' : 'score-low'}"><strong>${teacher.avgScore.toFixed(2)}</strong></td>
          <td class="score-high">${teacher.goodCount}</td>
          <td class="score-medium">${teacher.mediumCount}</td>
          <td class="score-low">${teacher.badCount}</td>
          <td>${teacher.avgScoreLook.toFixed(1)}</td>
          <td>${teacher.avgScoreBreast.toFixed(1)}</td>
          <td>${teacher.avgScoreWaist.toFixed(1)}</td>
          <td>${teacher.avgScoreBodyLower.toFixed(1)}</td>
          <td>${teacher.avgScoreService.toFixed(1)}</td>
          <td>${superSoldierText}</td>
          <td>${verifiedBadge}</td>
          <td>${featuresHtml}</td>
        `;
        
        tbody.appendChild(row);
      });
      
      // 更新统计
      document.getElementById('totalCount').textContent = data.length;
      document.getElementById('verifiedCount').textContent = data.filter(t => t.isVerified).length;
      document.getElementById('superSoldierTotal').textContent = data.reduce((sum, t) => sum + t.superSoldierCount, 0);
    }

    function applyFilters() {
      let filtered = [...currentData];

      // 应用全局搜索
      if (globalSearchTerm) {
        const term = globalSearchTerm.toLowerCase();
        filtered = filtered.filter(t =>
          t.teacher_name.toLowerCase().includes(term) ||
          t.teacher_id.toLowerCase().includes(term) ||
          t.features.some(f => f.toLowerCase().includes(term))
        );
      }

      // 定义只按最小值过滤的字段
      const minOnlyFields = ['totalTests', 'goodCount', 'mediumCount', 'badCount',
                             'avgScoreLook', 'avgScoreBreast', 'avgScoreWaist',
                             'avgScoreBodyLower', 'avgScoreService', 'superSoldierCount'];

      // 应用列过滤
      Object.keys(filters).forEach(field => {
        const filterValue = filters[field];
        if (!filterValue) return;

        filtered = filtered.filter(t => {
          const value = t[field];

          // 处理布尔值筛选
          if (field === 'isVerified') {
            return String(t.isVerified) === filterValue;
          }

          // 处理数组字段（features）
          if (field === 'features') {
            return t.features.some(f => f.toLowerCase().includes(filterValue.toLowerCase()));
          }

          // 处理字符串筛选
          if (typeof value === 'string') {
            return value.toLowerCase().includes(filterValue.toLowerCase());
          }

          // 处理数字筛选
          if (typeof value === 'number') {
            const numFilter = parseFloat(filterValue);
            if (!isNaN(numFilter)) {
              // 对于指定字段，只按最小值过滤（>=）
              if (minOnlyFields.includes(field)) {
                return value >= numFilter;
              }
              // 其他数值字段支持范围筛选（如 "5-10"）
              if (filterValue.includes('-')) {
                const parts = filterValue.split('-').map(p => parseFloat(p.trim()));
                if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                  return value >= parts[0] && value <= parts[1];
                }
              }
              // 默认精确匹配
              return value === numFilter;
            }
          }

          return true;
        });
      });

      // 重新排序
      if (sortField) {
        filtered.sort((a, b) => {
          let aVal, bVal;

          switch(sortField) {
            case 'name':
              aVal = a.teacher_name;
              bVal = b.teacher_name;
              break;
            case 'age':
              aVal = a.age;
              bVal = b.age;
              break;
            case 'height':
              aVal = a.height;
              bVal = b.height;
              break;
            case 'weight':
              aVal = a.weight;
              bVal = b.weight;
              break;
            case 'price':
              aVal = a.price;
              bVal = b.price;
              break;
            case 'avgScore':
              aVal = a.avgScore;
              bVal = b.avgScore;
              break;
            case 'totalTests':
              aVal = a.count;
              bVal = b.count;
              break;
            case 'superSoldier':
              aVal = a.superSoldierCount;
              bVal = b.superSoldierCount;
              break;
            default:
              return 0;
          }

          if (typeof aVal === 'string') {
            return sortDirection === 'asc'
              ? aVal.localeCompare(bVal)
              : bVal.localeCompare(aVal);
          }

          return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
        });
      }

      renderTable(filtered);

      // 高亮有过滤器的列
      document.querySelectorAll('.filter-input').forEach(input => {
        const field = input.dataset.field;
        const th = input.closest('th');
        if (filters[field]) {
          th.classList.add('active-filter');
        } else {
          th.classList.remove('active-filter');
        }
      });
    }

    function sortTable(field) {
      if (sortField === field) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortField = field;
        sortDirection = 'desc';
      }

      // 更新排序指示器
      document.querySelectorAll('.th-label').forEach(label => {
        label.classList.remove('sort-active');
        const icon = label.querySelector('.sort-icon');
        if (icon) {
          icon.textContent = '↕';
        }
      });

      // 高亮当前排序列
      const activeLabels = document.querySelectorAll(`.th-label[onclick="sortTable('${field}')"]`);
      activeLabels.forEach(label => {
        label.classList.add('sort-active');
        const icon = label.querySelector('.sort-icon');
        if (icon) {
          icon.textContent = sortDirection === 'asc' ? '↑' : '↓';
        }
      });

      // 重新应用过滤和排序
      applyFilters();
    }

    function exportCSV() {
      const headers = ['排名', '老师ID', '姓名', '年龄', '身高', '体重', '单价', '胸围', '综合评分', '好评', '中评', '差评', '颜值', '胸型', '腰腹', '臀腿', '配合度', '超级兵次数', '认证状态', '特色标签'];

      const rows = currentData.map((t, index) => [
        index + 1,
        t.teacher_id,
        t.teacher_name,
        t.age,
        t.height,
        t.weight,
        t.price,
        t.bust,
        t.avgScore.toFixed(2),
        t.goodCount,
        t.mediumCount,
        t.badCount,
        t.avgScoreLook.toFixed(1),
        t.avgScoreBreast.toFixed(1),
        t.avgScoreWaist.toFixed(1),
        t.avgScoreBodyLower.toFixed(1),
        t.avgScoreService.toFixed(1),
        t.superSoldierCount,
        t.isVerified ? '已认证' : '未认证',
        t.features.join(';')
      ]);
      
      const csvContent = '\ufeff' + [headers.join(','), ...rows.map(row => row.join(','))].join('\n');
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `老师数据_${new Date().toLocaleDateString()}.csv`;
      link.click();
    }

    function clearAllFilters() {
      // 清空所有过滤器
      filters = {};
      globalSearchTerm = '';

      // 清空所有输入框
      document.querySelectorAll('.filter-input').forEach(input => {
        if (input.tagName === 'SELECT') {
          input.value = '';
        } else {
          input.value = '';
        }
      });
      document.getElementById('globalSearch').value = '';

      // 移除高亮
      document.querySelectorAll('th').forEach(th => th.classList.remove('active-filter'));

      // 重新渲染（保持当前排序）
      applyFilters();
    }

    // 绑定过滤器输入事件
    document.querySelectorAll('.filter-input').forEach(input => {
      input.addEventListener('input', function(e) {
        const field = e.target.dataset.field;
        const value = e.target.value.trim();

        if (value) {
          filters[field] = value;
        } else {
          delete filters[field];
        }

        applyFilters();
      });
    });

    // 全局搜索
    document.getElementById('globalSearch').addEventListener('input', function(e) {
      globalSearchTerm = e.target.value.trim();
      applyFilters();
    });

    // 页面加载时获取数据
    loadData();
  </script>
</body>
</html>
