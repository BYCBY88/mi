
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>老师数据表格 v3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
    }
    .header h1 { font-size: 24px; font-weight: 600; }
    .debug-info {
      background: #fff3cd;
      border: 1px solid #ffc107;
      padding: 10px;
      margin: 10px 0;
      font-size: 12px;
      word-break: break-all;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error-message {
      text-align: center;
      padding: 40px;
      color: #dc3545;
    }
    .error-message button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #f8f9fa;
      padding: 8px 6px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-green { background: #d4edda; color: #155724; }
    .badge-gray { background: #e0e0e0; color: #666; }
    .badge-blue { background: #cce5ff; color: #004085; }
    .score-high { color: #28a745; font-weight: 600; }
    .score-medium { color: #ffc107; font-weight: 600; }
    .score-low { color: #dc3545; font-weight: 600; }
    @media (max-width: 768px) {
      body { padding: 10px; }
      .header { padding: 15px; }
      .header h1 { font-size: 18px; }
      table { font-size: 11px; }
      th, td { padding: 5px 3px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 老师数据表格 v3</h1>
      <div id="debugInfo" class="debug-info" style="display:none;"></div>
    </div>
    
    <div id="contentArea">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>正在加载数据...</div>
        <div id="loadingDetail" style="margin-top:10px;font-size:12px;color:#999;"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://super-soldier-api.bycby88.workers.dev';
    
    function showDebug(msg) {
      const el = document.getElementById('debugInfo');
      el.style.display = 'block';
      el.innerHTML += '<div>' + msg + '</div>';
    }
    
    function showError(msg, detail) {
      document.getElementById('contentArea').innerHTML = 
        '<div class="error-message">' +
        '<div>❌ ' + msg + '</div>' +
        (detail ? '<div style="margin-top:10px;font-size:12px;color:#666;">' + detail + '</div>' : '') +
        '<button onclick="location.reload()">重新加载</button>' +
        '</div>';
    }
    
    function showLoadingDetail(msg) {
      document.getElementById('loadingDetail').textContent = msg;
    }

    async function loadData() {
      showDebug('开始加载数据...');
      showDebug('API地址: ' + API_URL);
      showDebug('UserAgent: ' + navigator.userAgent.substring(0, 50));
      
      try {
        showLoadingDetail('准备发送请求...');
        
        // 方法1: 使用 XMLHttpRequest (兼容性更好)
        const xhr = new XMLHttpRequest();
        const url = API_URL + '/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at';
        
        showDebug('XHR URL: ' + url);
        
        xhr.open('GET', url, true);
        xhr.setRequestHeader('Accept', 'application/json');
        
        xhr.onreadystatechange = function() {
          showDebug('XHR state: ' + xhr.readyState);
          
          if (xhr.readyState === 4) {
            showDebug('XHR status: ' + xhr.status);
            
            if (xhr.status === 200) {
              try {
                const result = JSON.parse(xhr.responseText);
                showDebug('数据条数: ' + (result.items ? result.items.length : 0));
                processData(result.items || []);
              } catch (e) {
                showError('解析数据失败', e.message);
              }
            } else {
              showError('请求失败: HTTP ' + xhr.status, xhr.statusText);
            }
          }
        };
        
        xhr.onerror = function() {
          showDebug('XHR error triggered');
          // 如果 XHR 失败，尝试 fetch
          tryFetch();
        };
        
        xhr.timeout = 30000;
        xhr.ontimeout = function() {
          showError('请求超时', '30秒内未收到响应');
        };
        
        xhr.send();
        
      } catch (e) {
        showDebug('XHR 异常: ' + e.message);
        tryFetch();
      }
    }
    
    async function tryFetch() {
      showDebug('尝试使用 fetch...');
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        
        const response = await fetch(
          API_URL + '/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at',
          {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
            signal: controller.signal,
            mode: 'cors',
            cache: 'no-cache'
          }
        );
        
        clearTimeout(timeoutId);
        
        showDebug('Fetch status: ' + response.status);
        
        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }
        
        const result = await response.json();
        processData(result.items || []);
        
      } catch (error) {
        showDebug('Fetch error: ' + error.message);
        showError('加载数据失败', 
          '错误: ' + error.message + '<br>' +
          '请检查:<br>' +
          '1. 网络连接是否正常<br>' +
          '2. 是否使用 HTTPS<br>' +
          '3. 尝试用电脑浏览器打开对比'
        );
      }
    }
    
    function processData(records) {
      if (records.length === 0) {
        document.getElementById('contentArea').innerHTML = 
          '<div style="text-align:center;padding:40px;color:#999;">暂无数据</div>';
        return;
      }
      
      // 按老师ID分组统计
      const teacherStats = {};
      for (const record of records) {
        const teacherId = record.teacher_id;
        if (!teacherId) continue;
        
        if (!teacherStats[teacherId]) {
          teacherStats[teacherId] = {
            teacher_id: teacherId,
            teacher_name: record.teacher_name || '未知',
            age: record.age || '-',
            height: record.height || '-',
            weight: record.weight || '-',
            price: record.price || '-',
            bust: record.bust || '-',
            totalScore: 0, count: 0,
            goodCount: 0, mediumCount: 0, badCount: 0,
            superSoldierCount: 0,
            totalScoreLook: 0, totalScoreBreast: 0, totalScoreWaist: 0,
            totalScoreBodyLower: 0, totalScoreService: 0,
          };
        }
        
        const score = Number(record.final_score || 0);
        teacherStats[teacherId].totalScore += score;
        teacherStats[teacherId].count += 1;
        teacherStats[teacherId].totalScoreLook += Number(record.score_look || 0);
        teacherStats[teacherId].totalScoreBreast += Number(record.score_breast || 0);
        teacherStats[teacherId].totalScoreWaist += Number(record.score_waist || 0);
        teacherStats[teacherId].totalScoreBodyLower += Number(record.score_body_lower || 0);
        teacherStats[teacherId].totalScoreService += Number(record.score_service || 0);
        
        if (record.is_super_soldier_review === true || record.is_super_soldier_review === 1) {
          teacherStats[teacherId].superSoldierCount += 1;
        }
        
        if (score >= 8.5) teacherStats[teacherId].goodCount++;
        else if (score >= 6) teacherStats[teacherId].mediumCount++;
        else teacherStats[teacherId].badCount++;
      }
      
      // 转换为数组
      const currentData = Object.values(teacherStats).map(stats => ({
        ...stats,
        avgScore: stats.count > 0 ? stats.totalScore / stats.count : 0,
        avgScoreLook: stats.count > 0 ? stats.totalScoreLook / stats.count : 0,
        avgScoreBreast: stats.count > 0 ? stats.totalScoreBreast / stats.count : 0,
        avgScoreWaist: stats.count > 0 ? stats.totalScoreWaist / stats.count : 0,
        avgScoreBodyLower: stats.count > 0 ? stats.totalScoreBodyLower / stats.count : 0,
        avgScoreService: stats.count > 0 ? stats.totalScoreService / stats.count : 0,
        isVerified: stats.superSoldierCount > 0,
      })).sort((a, b) => b.avgScore - a.avgScore);
      
      renderTable(currentData);
    }
    
    function renderTable(data) {
      let html = '<table><thead><tr>' +
        '<th>排名</th><th>老师ID</th><th>姓名</th><th>年龄</th><th>身高</th><th>体重</th>' +
        '<th>单价</th><th>胸围</th><th>综合评分</th><th>好评</th><th>中评</th><th>差评</th>' +
        '<th>超级兵</th><th>认证</th>' +
        '</tr></thead><tbody>';
      
      data.forEach((t, i) => {
        const verifiedBadge = t.isVerified 
          ? '<span class="badge badge-green">已认证</span>' 
          : '<span class="badge badge-gray">未认证</span>';
        const superSoldierText = t.superSoldierCount > 0 
          ? `<span class="badge badge-blue">${t.superSoldierCount}次</span>` 
          : '-';
        const scoreClass = t.avgScore >= 8.5 ? 'score-high' : t.avgScore >= 6 ? 'score-medium' : 'score-low';
        
        html += `<tr>` +
          `<td>${i + 1}</td>` +
          `<td>${t.teacher_id}</td>` +
          `<td><strong>${t.teacher_name}</strong></td>` +
          `<td>${t.age}</td>` +
          `<td>${t.height}</td>` +
          `<td>${t.weight}</td>` +
          `<td>${t.price}</td>` +
          `<td>${t.bust}</td>` +
          `<td class="${scoreClass}"><strong>${t.avgScore.toFixed(2)}</strong></td>` +
          `<td class="score-high">${t.goodCount}</td>` +
          `<td class="score-medium">${t.mediumCount}</td>` +
          `<td class="score-low">${t.badCount}</td>` +
          `<td>${superSoldierText}</td>` +
          `<td>${verifiedBadge}</td>` +
          `</tr>`;
      });
      
      html += '</tbody></table>';
      html += `<div style="padding:15px;background:#f8f9fa;border-top:1px solid #e0e0e0;">` +
        `共 <strong>${data.length}</strong> 位老师 | ` +
        `已认证 <strong>${data.filter(t => t.isVerified).length}</strong> 位` +
        `</div>`;
      
      document.getElementById('contentArea').innerHTML = html;
    }
    
    // 页面加载时执行
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
