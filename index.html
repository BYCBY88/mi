<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="cache-control" content="no-cache">
  <title>老师数据表格 v2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .search-box {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      width: 200px;
    }
    
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: white;
      color: #667eea;
      font-weight: 500;
    }
    
    .btn-primary:hover {
      background: #f0f0f0;
    }
    
    .btn-clear {
      background: #6c757d;
      color: white;
    }
    
    .btn-clear:hover {
      background: #5a6268;
    }
    
    .table-wrapper {
      overflow-x: auto;
      max-height: 70vh;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    th {
      background: #f8f9fa;
      padding: 8px 6px;
      text-align: left;
      font-weight: 600;
      color: #333;
      border-bottom: 2px solid #e0e0e0;
      white-space: nowrap;
      vertical-align: top;
    }
    
    .th-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .th-label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
    }
    
    .th-label:hover {
      color: #667eea;
    }
    
    .filter-input {
      width: 100%;
      padding: 4px 6px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 11px;
      outline: none;
    }
    
    .filter-input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }
    
    td {
      padding: 10px;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }
    
    tr:hover {
      background: #f8f9fa;
    }
    
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }
    
    .badge-green {
      background: #d4edda;
      color: #155724;
    }
    
    .badge-gray {
      background: #e0e0e0;
      color: #666;
    }
    
    .badge-blue {
      background: #cce5ff;
      color: #004085;
    }
    
    .tag {
      display: inline-block;
      padding: 2px 6px;
      background: #e3f2fd;
      color: #1976d2;
      border-radius: 3px;
      font-size: 11px;
      margin-right: 4px;
    }
    
    .score-high {
      color: #28a745;
      font-weight: 600;
    }
    
    .score-medium {
      color: #ffc107;
      font-weight: 600;
    }
    
    .score-low {
      color: #dc3545;
      font-weight: 600;
    }
    
    .stats {
      padding: 15px 30px;
      background: #f8f9fa;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 30px;
      font-size: 14px;
      color: #666;
      align-items: center;
    }
    
    .stats strong {
      color: #333;
    }
    
    .sort-icon {
      display: inline-block;
      margin-left: 4px;
      font-size: 12px;
      opacity: 0.3;
      transition: all 0.2s;
    }
    .th-label:hover .sort-icon {
      opacity: 0.7;
    }
    .sort-active .sort-icon {
      opacity: 1;
      color: #667eea;
      font-weight: bold;
    }
    .sort-active {
      color: #667eea;
      font-weight: 600;
    }
    .active-filter {
      background: #fff3cd !important;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 错误提示 */
    .error-message {
      text-align: center;
      padding: 40px;
      color: #dc3545;
    }
    
    .error-message button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .error-message button:hover {
      background: #5a6fd6;
    }
    
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      .container {
        border-radius: 4px;
      }
      .header {
        flex-direction: column;
        gap: 12px;
        padding: 15px;
        align-items: flex-start;
      }
      .header h1 {
        font-size: 18px;
      }
      .header p {
        font-size: 12px;
      }
      .header > div > div {
        flex-wrap: wrap;
      }
      .header a {
        padding: 6px 12px !important;
        font-size: 12px !important;
      }
      .controls {
        width: 100%;
        flex-direction: column;
        gap: 8px;
      }
      .search-box {
        width: 100%;
      }
      .btn {
        flex: 1;
        margin-left: 0 !important;
      }
      .controls > div:last-child {
        display: flex;
        gap: 8px;
        width: 100%;
      }
      .table-wrapper {
        max-height: 60vh;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      table {
        font-size: 11px;
      }
      th, td {
        padding: 5px 3px;
      }
      .th-content {
        min-width: 60px;
      }
      .filter-input {
        font-size: 9px;
        padding: 2px 3px;
        min-width: 50px;
      }
      .stats {
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px 15px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>📊 老师数据表格</h1>
        <p style="margin-top: 8px; font-size: 13px; opacity: 0.9;">
           数据来源于用户真实测评反馈，仅供参考
        </p>
        <div style="margin-top: 12px; display: flex; gap: 10px;">
          <a href="https://bycby88.github.io/ZSFK/" target="_blank" style="display: inline-block; padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 4px; font-weight: 500; font-size: 13px; border: 1px solid rgba(255,255,255,0.3); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">
             参与测评(使用浏览器打开) →
          </a>
          <a href="https://tatokdym.org/cqfkq" target="_blank" style="display: inline-block; padding: 8px 16px; background: rgba(255,255,255,0.2); color: white; text-decoration: none; border-radius: 4px; font-weight: 500; font-size: 13px; border: 1px solid rgba(255,255,255,0.3); transition: all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">
             详细报告内容 →
          </a>
        </div>
      </div>
      <div class="controls">
        <input type="text" class="search-box" id="globalSearch" placeholder="全局搜索...">
        <button class="btn btn-clear" onclick="clearAllFilters()">🔄 清除筛选</button>
        <button class="btn btn-primary" onclick="exportCSV()" style="margin-left: 8px;">📥 导出CSV</button>
      </div>
    </div>
    
    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('rank')">排名 <span class="sort-icon">↕</span></div>
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>老师ID</div>
                <input type="text" class="filter-input" data-field="teacher_id" placeholder="过滤ID...">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('name')">姓名 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="teacher_name" placeholder="过滤姓名...">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('age')">年龄 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="age" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('height')">身高 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="height" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('weight')">体重 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="weight" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('price')">单价 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="price" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>胸围</div>
                <input type="text" class="filter-input" data-field="bust" placeholder="过滤胸围...">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('avgScore')">综合评分 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="avgScore" placeholder="最小-最大">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>好评</div>
                <input type="text" class="filter-input" data-field="goodCount" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>中评</div>
                <input type="text" class="filter-input" data-field="mediumCount" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>差评</div>
                <input type="text" class="filter-input" data-field="badCount" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>颜值</div>
                <input type="text" class="filter-input" data-field="avgScoreLook" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>胸型</div>
                <input type="text" class="filter-input" data-field="avgScoreBreast" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>腰腹</div>
                <input type="text" class="filter-input" data-field="avgScoreWaist" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>臀腿</div>
                <input type="text" class="filter-input" data-field="avgScoreBodyLower" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>配合度</div>
                <input type="text" class="filter-input" data-field="avgScoreService" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div class="th-label" onclick="sortTable('superSoldier')">超级兵 <span class="sort-icon">↕</span></div>
                <input type="text" class="filter-input" data-field="superSoldierCount" placeholder="≥ 最小值">
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>认证状态</div>
                <select class="filter-input" data-field="isVerified">
                  <option value="">全部</option>
                  <option value="true">已认证</option>
                  <option value="false">未认证</option>
                </select>
              </div>
            </th>
            <th>
              <div class="th-content">
                <div>特色标签</div>
                <input type="text" class="filter-input" data-field="features" placeholder="过滤标签...">
              </div>
            </th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="21" class="loading"><div class="loading-spinner"></div><div>正在加载数据...</div></td></tr>
        </tbody>
      </table>
    </div>
    
    <div class="stats">
      <span>共 <strong id="totalCount">0</strong> 位老师</span>
      <span>已认证 <strong id="verifiedCount">0</strong> 位</span>
      <span>超级兵测评 <strong id="superSoldierTotal">0</strong> 次</span>
    </div>
  </div>
  <script>
    // Cloudflare Workers API 配置
    const API_URL = 'https://super-soldier-api.bycby88.workers.dev';
    let currentData = [];
    let sortField = 'avgScore';
    let sortDirection = 'desc';
    let filters = {};
    let globalSearchTerm = '';

    // 缓存配置 - 使用内存缓存替代 localStorage
    let memoryCache = null;
    let memoryCacheTime = 0;
    const CACHE_DURATION = 30 * 60 * 1000; // 30分钟

    // 检测是否为移动设备
    function isMobile() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    // 安全的缓存存储（修复移动端localStorage无痕失效）
    function setCache(key, value) {
      try {
        if (key === 'data') {
          memoryCache = value;
          memoryCacheTime = Date.now();
        }
        localStorage.setItem('teacher_table_' + key, JSON.stringify(value));
      } catch (e) {
        console.warn('本地存储不可用，仅使用内存缓存', e);
      }
    }

    function getCache(key) {
      try {
        if (key === 'data' && memoryCache && (Date.now() - memoryCacheTime) < CACHE_DURATION) {
          return memoryCache;
        }
        const item = localStorage.getItem('teacher_table_' + key);
        return item ? JSON.parse(item) : null;
      } catch (e) {
        console.warn('读取本地存储失败', e);
        return key === 'data' ? memoryCache : null;
      }
    }

    // 显示加载状态
    function showLoading() {
      document.getElementById('tableBody').innerHTML = 
        '<tr><td colspan="21" class="loading"><div class="loading-spinner"></div><div>正在加载数据...</div></td></tr>';
    }

    // 显示错误状态
    function showError(message, retryCallback) {
      const errorHtml = `
        <tr><td colspan="21" class="error-message">
          <div>❌ ${message}</div>
          <button onclick="${retryCallback}">重新加载</button>
        </td></tr>
      `;
      document.getElementById('tableBody').innerHTML = errorHtml;
    }

    // 从 Cloudflare Workers API 加载数据（修复sort字段、8秒超时、移除mode:cors）
    async function loadData() {
      showLoading();
      
      const now = Date.now();
      const cachedData = getCache('data');
      const cachedTime = getCache('time');
      
      // 检查缓存是否有效
      if (cachedData && cachedTime && (now - cachedTime) < CACHE_DURATION) {
        currentData = cachedData;
        renderTable(currentData);
        return;
      }

      try {
        // 手机弱网8秒超时
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        
        const response = await fetch(
          `${API_URL}/api/collections/test_records/records?page=1&perPage=1000&sort=-created_at`,
          {
            method: 'GET',
            headers: {
              'Content-Type': 'application/json'
            },
            signal: controller.signal
          }
        );
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const result = await response.json();
        const records = result.items || [];

        if (records.length === 0) {
          document.getElementById('tableBody').innerHTML = 
            '<tr><td colspan="21" style="text-align:center;padding:40px;color:#999;">暂无数据</td></tr>';
          return;
        }

        // 按老师ID分组统计
        const teacherStats = {};
        for (const record of records) {
          const teacherId = record.teacher_id;
          if (!teacherId) continue;
          
          if (!teacherStats[teacherId]) {
            teacherStats[teacherId] = {
              teacher_id: teacherId,
              teacher_name: record.teacher_name || '未知',
              age: record.age || '-',
              height: record.height || '-',
              weight: record.weight || '-',
              price: record.price || '-',
              bust: record.bust || '-',
              totalScore: 0,
              count: 0,
              goodCount: 0,
              mediumCount: 0,
              badCount: 0,
              features: [],
              superSoldierCount: 0,
              totalScoreLook: 0,
              totalScoreBreast: 0,
              totalScoreWaist: 0,
              totalScoreBodyLower: 0,
              totalScoreService: 0,
            };
          }

          const score = Number(record.final_score || 0);
          teacherStats[teacherId].totalScore += score;
          teacherStats[teacherId].count += 1;
          teacherStats[teacherId].totalScoreLook += Number(record.score_look || 0);
          teacherStats[teacherId].totalScoreBreast += Number(record.score_breast || 0);
          teacherStats[teacherId].totalScoreWaist += Number(record.score_waist || 0);
          teacherStats[teacherId].totalScoreBodyLower += Number(record.score_body_lower || 0);
          teacherStats[teacherId].totalScoreService += Number(record.score_service || 0);

          if (record.is_super_soldier_review === true || record.is_super_soldier_review === 1) {
            teacherStats[teacherId].superSoldierCount += 1;
          }

          if (score >= 8.5) {
            teacherStats[teacherId].goodCount += 1;
          } else if (score >= 6) {
            teacherStats[teacherId].mediumCount += 1;
          } else {
            teacherStats[teacherId].badCount += 1;
          }

          if (record.features && Array.isArray(record.features)) {
            record.features.forEach(feature => {
              if (!teacherStats[teacherId].features.includes(feature)) {
                teacherStats[teacherId].features.push(feature);
              }
            });
          }
        }

        // 转换为数组并计算平均值
        currentData = Object.values(teacherStats).map(stats => ({
          ...stats,
          avgScore: stats.count > 0 ? stats.totalScore / stats.count : 0,
          avgScoreLook: stats.count > 0 ? stats.totalScoreLook / stats.count : 0,
          avgScoreBreast: stats.count > 0 ? stats.totalScoreBreast / stats.count : 0,
          avgScoreWaist: stats.count > 0 ? stats.totalScoreWaist / stats.count : 0,
          avgScoreBodyLower: stats.count > 0 ? stats.totalScoreBodyLower / stats.count : 0,
          avgScoreService: stats.count > 0 ? stats.totalScoreService / stats.count : 0,
          isVerified: stats.superSoldierCount > 0,
        }));

        // 默认按综合评分降序排序
        sortField = 'avgScore';
        sortDirection = 'desc';
        currentData.sort((a, b) => b.avgScore - a.avgScore);

        // 高亮综合评分列
        const avgScoreLabels = document.querySelectorAll('.th-label[onclick="sortTable(\'avgScore\')"]');
        avgScoreLabels.forEach(label => {
          label.classList.add('sort-active');
          const icon = label.querySelector('.sort-icon');
          if (icon) {
            icon.textContent = '↓';
          }
        });

        renderTable(currentData);

        // 保存到缓存
        setCache('data', currentData);
        setCache('time', now);
        
      } catch (error) {
        console.error('加载数据失败:', error);
        let errorMsg = '加载数据失败';
        if (error.name === 'AbortError') {
          errorMsg = '请求超时，请检查网络连接';
        } else if (error.message.includes('Failed to fetch')) {
          errorMsg = '网络请求失败，请检查网络连接或尝试使用其他浏览器';
        } else {
          errorMsg = `加载失败: ${error.message}`;
        }
        showError(errorMsg, 'loadData()');
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="21" style="text-align:center;padding:40px;color:#999;">暂无数据</td></tr>';
        return;
      }
      
      data.forEach((teacher, index) => {
        const row = document.createElement('tr');
        
        const verifiedBadge = teacher.isVerified 
          ? '<span class="badge badge-green">已认证</span>' 
          : '<span class="badge badge-gray">未认证</span>';
        
        const superSoldierText = teacher.superSoldierCount > 0 
          ? `<span class="badge badge-blue">${teacher.superSoldierCount}次</span>` 
          : '-';
        
        const featuresHtml = teacher.features && teacher.features.length >
